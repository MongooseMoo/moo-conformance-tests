name: generated_builtin_signature_atan
description: Generated conformance tests for atan() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - atan
tests:
- name: atan_function_info_signature_matches_source
  permission: wizard
  code: function_info("atan")
  expect:
    value:
    - atan
    - 1
    - 2
    - - 9
      - 9
- name: atan_too_few_args
  permission: wizard
  code: atan()
  expect:
    error: E_ARGS
- name: atan_too_many_args
  permission: wizard
  code: atan(1.5, 1.5, 1)
  expect:
    error: E_ARGS
- name: atan_arg_1_rejects_wrong_type
  permission: wizard
  code: atan("x")
  expect:
    error: E_TYPE
- name: atan_arg_2_rejects_wrong_type
  permission: wizard
  code: atan(1.5, "x")
  expect:
    error: E_TYPE
- name: atan_runtime_outcome_matches_inferred_types
  permission: wizard
  statement: "try\n  result = atan(1.5);\n  return typeof(result) == FLOAT;\nexcept\
    \ e (E_FLOAT, E_INVARG)\n  return 1;\nendtry\n"
  expect:
    value: 1
