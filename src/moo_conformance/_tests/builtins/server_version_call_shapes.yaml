name: server_version_call_shapes
description: Table-driven TYPE_ANY coverage for server_version().

requires:
  builtins:
    - server_version

tests:
  - name: server_version_detail_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [int, "1"]
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '""']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: "server_version({expr})"
    expect:
      type: list
