name: sqlite_limit_call_shapes
description: TYPE_ANY limit category call-shape coverage for sqlite_limit().

requires:
  builtins:
    - sqlite_limit

tests:
  - name: sqlite_limit_rejects_invalid_handle_with_category_{category_kind}
    permission: wizard
    table:
      columns: [category_kind, category_expr]
      rows:
        - [int, "1"]
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"LIMIT_COLUMN"']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: "sqlite_limit(999999, {category_expr}, -1)"
    expect:
      error: E_INVARG
