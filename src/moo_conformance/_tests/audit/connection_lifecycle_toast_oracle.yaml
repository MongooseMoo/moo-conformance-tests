name: audit_connection_lifecycle_toast_oracle
description: Toast-confirmed audit cases for observable connection and lifecycle behavior.

requires:
  builtins:
    - add_property
    - delete_property
    - add_verb
    - delete_verb
    - verb_info
    - set_verb_info
    - verb_args
    - set_verb_args
    - verb_code
    - set_verb_code
    - connection_name
    - connection_info
    - create
    - recycle
    - valid
    - set_player_flag
    - boot_player
    - connected_players
    - force_input
    - set_connection_option
    - listen
    - unlisten
    - suspend
    - move
    - task_perms
    - set_task_perms

tests:
  - name: audit_listener_handler_do_login_command
    description: Toast dispatches login commands to the object passed to listen(), not always #0.
    steps:
      - allocate_port:
          capture: listener_port
      - run: |
          for prop in ({"audit_listener_handler", "audit_listener_port", "audit_listener_seen"})
            try
              add_property(#0, prop, {}, {#0, "rw"});
            except (E_INVARG)
            endtry
          endfor
          handler = create($nothing);
          #0.audit_listener_handler = handler;
          #0.audit_listener_port = {listener_port};
          add_verb(handler, {player, "rxd", "do_login_command"}, {"this", "none", "this"});
          set_verb_code(handler, "do_login_command", {
            "#0.audit_listener_seen = {this, args, argstr};",
            "return 0;"
          });
          return listen(handler, {listener_port}, ["print-messages" -> 0]);
        as: wizard
        expect:
          type: int
      - new_connection:
          capture: conn1
          port: "{listener_port}"
      - send:
          connection: conn1
          text: "listener-login alpha beta"
      - wait: 500
      - run: |
          return {#0.audit_listener_seen[1] == #0.audit_listener_handler, #0.audit_listener_seen[2], #0.audit_listener_seen[3]};
        as: wizard
        expect:
          value:
            - 1
            -
              - listener-login
              - alpha
              - beta
            - "listener-login alpha beta"
      - close_connection: conn1
    cleanup:
      - run: |
          try
            unlisten(#0.audit_listener_port);
          except (ANY)
          endtry
          try
            recycle(#0.audit_listener_handler);
          except (ANY)
          endtry
          for prop in ({"audit_listener_handler", "audit_listener_port", "audit_listener_seen"})
            try
              delete_property(#0, prop);
            except (ANY)
            endtry
          endfor
        as: wizard

  - name: audit_listener_handler_do_command
    description: Toast dispatches post-login do_command fallback to the connection's listener handler.
    steps:
      - allocate_port:
          capture: listener_port
      - run: |
          for prop in ({"audit_command_handler", "audit_command_port", "audit_command_player", "audit_command_seen"})
            try
              add_property(#0, prop, {}, {#0, "rw"});
            except (E_INVARG)
            endtry
          endfor
          handler = create($nothing);
          login_player = create($nothing);
          set_player_flag(login_player, 1);
          #0.audit_command_handler = handler;
          #0.audit_command_player = login_player;
          #0.audit_command_port = {listener_port};
          add_verb(handler, {player, "rxd", "do_login_command"}, {"this", "none", "this"});
          set_verb_code(handler, "do_login_command", {"return #0.audit_command_player;"});
          add_verb(handler, {player, "rxd", "do_command"}, {"this", "none", "this"});
          set_verb_code(handler, "do_command", {
            "#0.audit_command_seen = {this, player, args, argstr};",
            "return 0;"
          });
          return listen(handler, {listener_port}, ["print-messages" -> 0]);
        as: wizard
        expect:
          type: int
      - new_connection:
          capture: conn1
          port: "{listener_port}"
      - send:
          connection: conn1
          text: "login-through-handler"
      - wait: 500
      - send:
          connection: conn1
          text: "postlogin alpha beta"
      - wait: 500
      - run: |
          return {#0.audit_command_seen[1] == #0.audit_command_handler, #0.audit_command_seen[2] == #0.audit_command_player, #0.audit_command_seen[3], #0.audit_command_seen[4]};
        as: wizard
        expect:
          value:
            - 1
            - 1
            -
              - postlogin
              - alpha
              - beta
            - "postlogin alpha beta"
      - close_connection: conn1
    cleanup:
      - run: |
          try
            unlisten(#0.audit_command_port);
          except (ANY)
          endtry
          try
            boot_player(#0.audit_command_player);
          except (ANY)
          endtry
          try
            recycle(#0.audit_command_player);
          except (ANY)
          endtry
          try
            recycle(#0.audit_command_handler);
          except (ANY)
          endtry
          for prop in ({"audit_command_handler", "audit_command_port", "audit_command_player", "audit_command_seen"})
            try
              delete_property(#0, prop);
            except (ANY)
            endtry
          endfor
        as: wizard

  - name: audit_listener_handler_do_blank_command
    description: Toast dispatches trusted-proxy blank login input to the connection's listener handler.
    steps:
      - allocate_port:
          capture: listener_port
      - run: |
          for prop in ({"audit_blank_handler", "audit_blank_port", "audit_blank_seen", "audit_blank_trusted_saved"})
            try
              add_property(#0, prop, {}, {#0, "rw"});
            except (E_INVARG)
            endtry
          endfor
          trusted_exists = 1;
          try
            trusted_saved = #6.trusted_proxies;
          except (E_PROPNF)
            trusted_exists = 0;
            trusted_saved = {};
          endtry
          #0.audit_blank_trusted_saved = {trusted_exists, trusted_saved};
          try
            add_property(#6, "trusted_proxies", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          #6.trusted_proxies = {connection_info(player)["destination_ip"]};
          handler = create($nothing);
          #0.audit_blank_handler = handler;
          #0.audit_blank_port = {listener_port};
          add_verb(handler, {player, "rxd", "do_blank_command"}, {"this", "none", "none"});
          set_verb_code(handler, "do_blank_command", {
            "#0.audit_blank_seen = {this, args, argstr};",
            "return 0;"
          });
          return listen(handler, {listener_port}, ["print-messages" -> 0]);
        as: wizard
        expect:
          type: int
      - new_connection:
          capture: conn1
          port: "{listener_port}"
      - send:
          connection: conn1
          text: ""
      - wait: 500
      - run: |
          return {#0.audit_blank_seen[1] == #0.audit_blank_handler, #0.audit_blank_seen[2], #0.audit_blank_seen[3]};
        as: wizard
        expect:
          value:
            - 1
            - []
            - ""
      - close_connection: conn1
    cleanup:
      - run: |
          try
            unlisten(#0.audit_blank_port);
          except (ANY)
          endtry
          try
            saved = #0.audit_blank_trusted_saved;
            if (saved[1])
              #6.trusted_proxies = saved[2];
            else
              delete_property(#6, "trusted_proxies");
            endif
          except (ANY)
          endtry
          try
            recycle(#0.audit_blank_handler);
          except (ANY)
          endtry
          for prop in ({"audit_blank_handler", "audit_blank_port", "audit_blank_seen", "audit_blank_trusted_saved"})
            try
              delete_property(#0, prop);
            except (ANY)
            endtry
          endfor
        as: wizard

  - name: audit_proxy_command_clears_login_input
    description: Toast parses a trusted PROXY command and calls do_login_command with empty input.
    steps:
      - run: |
          for prop in ({"audit_proxy_seen", "audit_proxy_login_saved", "audit_proxy_trusted_saved"})
            try
              add_property(#0, prop, {}, {#0, "rw"});
            except (E_INVARG)
            endtry
          endfor
          trusted_exists = 1;
          try
            trusted_saved = #6.trusted_proxies;
          except (E_PROPNF)
            trusted_exists = 0;
            trusted_saved = {};
          endtry
          #0.audit_proxy_trusted_saved = {trusted_exists, trusted_saved};
          try
            add_property(#6, "trusted_proxies", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          #6.trusted_proxies = {connection_info(player)["destination_ip"]};
          old_login_exists = 1;
          try
            old_login_info = verb_info(#0, "do_login_command");
            old_login_args = verb_args(#0, "do_login_command");
            old_login_code = verb_code(#0, "do_login_command");
          except (E_VERBNF)
            old_login_exists = 0;
            old_login_info = {};
            old_login_args = {};
            old_login_code = {};
          endtry
          #0.audit_proxy_login_saved = {old_login_exists, old_login_info, old_login_args, old_login_code};
          try
            add_verb(#0, {#0, "rxd", "do_login_command"}, {"this", "none", "this"});
          except (E_INVARG)
          endtry
          set_verb_info(#0, "do_login_command", {player, "rxd", "do_login_command"});
          set_verb_args(#0, "do_login_command", {"this", "none", "this"});
          set_verb_code(#0, "do_login_command", {
            "#0.audit_proxy_seen = {args, argstr};",
            "return 0;"
          });
          return 1;
        as: wizard
      - new_connection:
          capture: conn1
      - send:
          connection: conn1
          text: "PROXY TCP4 127.0.0.1 198.51.100.9 4242 7777"
      - wait: 500
      - run: "return #0.audit_proxy_seen;"
        as: wizard
        expect:
          value:
            - []
            - ""
      - close_connection: conn1
    cleanup:
      - run: |
          try
            saved = #0.audit_proxy_login_saved;
            if (saved[1])
              set_verb_info(#0, "do_login_command", saved[2]);
              set_verb_args(#0, "do_login_command", saved[3]);
              set_verb_code(#0, "do_login_command", saved[4]);
            else
              delete_verb(#0, "do_login_command");
            endif
          except (ANY)
          endtry
          try
            saved = #0.audit_proxy_trusted_saved;
            if (saved[1])
              #6.trusted_proxies = saved[2];
            else
              delete_property(#6, "trusted_proxies");
            endif
          except (ANY)
          endtry
          for prop in ({"audit_proxy_seen", "audit_proxy_login_saved", "audit_proxy_trusted_saved"})
            try
              delete_property(#0, prop);
            except (ANY)
            endtry
          endfor
        as: wizard

