name: generated_builtin_signature_sort
description: Generated conformance tests for sort() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - sort
tests:
- name: sort_function_info_signature_matches_source
  permission: wizard
  code: function_info("sort")
  expect:
    value:
    - sort
    - 1
    - 4
    - - 4
      - 4
      - 0
      - 0
- name: sort_too_few_args
  permission: wizard
  code: sort()
  expect:
    error: E_ARGS
- name: sort_too_many_args
  permission: wizard
  code: sort({}, {}, 1, 1, 1)
  expect:
    error: E_ARGS
- name: sort_arg_1_rejects_wrong_type
  permission: wizard
  code: sort(1)
  expect:
    error: E_TYPE
- name: sort_arg_2_rejects_wrong_type
  permission: wizard
  code: sort({}, 1)
  expect:
    error: E_TYPE
- name: sort_arg_3_rejects_wrong_type
  permission: wizard
  code: sort({}, {}, "x")
  expect:
    error: E_TYPE
- name: sort_arg_4_rejects_wrong_type
  permission: wizard
  code: sort({}, {}, 1, "x")
  expect:
    error: E_TYPE
