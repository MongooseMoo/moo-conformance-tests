name: set_property_info_call_shapes
description: Table-driven TYPE_ANY coverage for set_property_info().

requires:
  builtins:
    - set_property_info

tests:
  - name: set_property_info_arg_obj
    permission: wizard
    code: 'set_property_info(#0, "no_such_property", {#0, ""})'
    expect:
      error: E_PROPNF

  - name: set_property_info_arg_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [int, 'set_property_info(1, "name", {#0, ""})']
        - [float, 'set_property_info(1.5, "name", {#0, ""})']
        - [str, 'set_property_info("x", "name", {#0, ""})']
        - [err, 'set_property_info(E_ARGS, "name", {#0, ""})']
        - [map, 'set_property_info([1 -> 2], "name", {#0, ""})']
    code: "{expr}"
    expect:
      error: E_TYPE
