name: generated_builtin_signature_index
description: Generated conformance tests for index() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - index
tests:
- name: index_function_info_signature_matches_source
  permission: wizard
  code: function_info("index")
  expect:
    value:
    - index
    - 2
    - 4
    - - 2
      - 2
      - -1
      - 0
- name: index_too_few_args
  permission: wizard
  code: index()
  expect:
    error: E_ARGS
- name: index_too_many_args
  permission: wizard
  code: index("x", "x", 1, 1, 1)
  expect:
    error: E_ARGS
- name: index_arg_1_rejects_wrong_type
  permission: wizard
  code: index(1, "x")
  expect:
    error: E_TYPE
- name: index_arg_2_rejects_wrong_type
  permission: wizard
  code: index("x", 1)
  expect:
    error: E_TYPE
- name: index_arg_4_rejects_wrong_type
  permission: wizard
  code: index("x", "x", 1, "x")
  expect:
    error: E_TYPE
