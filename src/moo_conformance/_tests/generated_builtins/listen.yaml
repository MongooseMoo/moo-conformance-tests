name: generated_builtin_signature_listen
description: Generated conformance tests for listen() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - listen
tests:
- name: listen_function_info_signature_matches_source
  permission: wizard
  code: function_info("listen")
  expect:
    value:
    - listen
    - 2
    - 3
    - - 1
      - -1
      - 10
- name: listen_too_few_args
  permission: wizard
  code: listen()
  expect:
    error: E_ARGS
- name: listen_too_many_args
  permission: wizard
  code: listen(#0, 1, [1 -> 2], 1)
  expect:
    error: E_ARGS
- name: listen_arg_1_rejects_wrong_type
  permission: wizard
  code: listen("x", 1)
  expect:
    error: E_TYPE
- name: listen_arg_3_rejects_wrong_type
  permission: wizard
  code: listen(#0, 1, 1)
  expect:
    error: E_TYPE
