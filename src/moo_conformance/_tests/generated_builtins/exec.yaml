name: generated_builtin_signature_exec
description: Generated conformance tests for exec() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - exec
tests:
- name: exec_function_info_signature_matches_source
  permission: wizard
  code: function_info("exec")
  expect:
    value:
    - exec
    - 1
    - 3
    - - 4
      - 2
      - 4
- name: exec_too_few_args
  permission: wizard
  code: exec()
  expect:
    error: E_ARGS
- name: exec_too_many_args
  permission: wizard
  code: exec({}, "x", {}, 1)
  expect:
    error: E_ARGS
- name: exec_arg_1_rejects_wrong_type
  permission: wizard
  code: exec(1)
  expect:
    error: E_TYPE
- name: exec_arg_2_rejects_wrong_type
  permission: wizard
  code: exec({}, 1)
  expect:
    error: E_TYPE
- name: exec_arg_3_rejects_wrong_type
  permission: wizard
  code: exec({}, "x", 1)
  expect:
    error: E_TYPE
