name: startup_repair_anon5
description: Accounts for loaded anonymous objects from ToastStunt's Anon5 canned DB.
server_db: Anon5.db
requires:
  config:
    - managed_server
    - server_dir
    - log_file
    - server_db_dir
tests:
  - name: loaded_anonymous_objects_are_written_to_output_db
    steps:
      - wait: 500
      - assert_log:
          contains: "indirectly references an anonymous object"
      - assert_file:
          path: Anon5.db.new
          contains: "0 values pending finalization"
