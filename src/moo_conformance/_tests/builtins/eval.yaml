name: eval
description: Tests for eval() builtin

requires:
  builtins: [eval]

tests:
  - name: eval_requires_programmer
    steps:
      - run: "create($nothing)"
        as: wizard
        capture: owner
      - run: "create($nothing)"
        as: wizard
        capture: target
      - run: "{owner}.programmer = 0; return {owner}.programmer;"
        as: wizard
        expect:
          value: 0
      - run: |
          add_verb({target}, {{owner}, "xd", "try_eval_permission"}, {"this", "none", "this"});
          return set_verb_code({target}, "try_eval_permission", {"return eval(\"return 5;\");"});
        as: wizard
      - run: "return {target}:try_eval_permission();"
        as: wizard
        expect:
          error: E_PERM
    cleanup:
      - run: "recycle({target}); recycle({owner});"
        as: wizard

  - name: eval_requires_at_least_one_argument
    permission: wizard
    code: "eval()"
    expect:
      error: E_ARGS

  - name: eval_requires_string_arguments_int
    permission: wizard
    code: "eval(1)"
    expect:
      error: E_TYPE

  - name: eval_requires_string_arguments_two_ints
    permission: wizard
    code: "eval(1, 2)"
    expect:
      error: E_TYPE

  - name: eval_requires_string_arguments_map
    permission: wizard
    code: "eval({})"
    expect:
      error: E_TYPE

  - name: eval_requires_string_arguments_list
    permission: wizard
    code: "eval([])"
    expect:
      error: E_TYPE

  - name: eval_evaluates_multiple_strings
    permission: wizard
    code: 'eval("x = 0;", "for i in [1..5]", "x = x + i;", "endfor", "return x;")'
    expect:
      value: [1, 15]

  - name: eval_evaluates_single_string
    permission: wizard
    code: 'eval("return 5;")'
    expect:
      value: [1, 5]

  - name: eval_runtime_error_returns_error_value
    permission: wizard
    code: 'eval("return 1 / 0;")'
    expect:
      error: E_DIV

  - name: eval_string_index_succeeds_in_eval_frame
    permission: wizard
    code: 'eval("return index(\"caller && raise(E_PERM);\", \"caller\");")'
    expect:
      value: [1, 1]
