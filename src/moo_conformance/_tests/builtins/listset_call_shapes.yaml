name: listset_call_shapes
description: Table-driven TYPE_ANY coverage for listset().

requires:
  builtins:
    - listset

tests:
  - name: listset_value_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [map, "[1 -> 2]"]
    code: "listset({0}, {expr}, 1)"
    expect:
      type: list
