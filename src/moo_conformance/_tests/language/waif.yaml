name: waif
description: Tests for waif (lightweight objects) functionality
tests:
- name: waifs_are_invalid
  code: valid($waif:new())
  expect:
    value: 0
- name: waifs_have_no_parents
  code: parents($waif:new())
  expect:
    error: E_INVARG
- name: waifs_have_no_children
  code: children($waif:new())
  expect:
    error: E_INVARG
- name: waifs_cannot_check_player_flag
  code: is_player($waif:new())
  expect:
    error: E_TYPE
- name: waifs_cannot_set_player_flag
  code: set_player_flag($waif:new(), 1)
  expect:
    error: E_TYPE
- name: waif_owner_is_creator
  statement: 'w = $waif:new();

    return w.owner == player;

    '
  expect:
    value: 1
- name: programmer_cannot_change_waif_owner
  statement: 'a = $waif:new();

    a.owner = a.owner;

    '
  expect:
    error: E_PERM
- name: wizard_cannot_change_waif_owner
  permission: wizard
  statement: 'a = $waif:new();

    a.owner = $nothing;

    return a.owner;

    '
  expect:
    error: E_PERM
- name: waif_programmer_cannot_set_wizard_flag_false
  statement: '$waif:new().wizard = 0;

    '
  expect:
    error: E_PERM
- name: waif_programmer_cannot_set_wizard_flag_true
  statement: '$waif:new().wizard = 1;

    '
  expect:
    error: E_PERM
- name: waif_wizard_cannot_set_wizard_flag_false
  permission: wizard
  statement: '$waif:new().wizard = 0;

    '
  expect:
    error: E_PERM
- name: waif_wizard_cannot_set_wizard_flag_true
  permission: wizard
  statement: '$waif:new().wizard = 1;

    '
  expect:
    error: E_PERM
- name: waif_programmer_cannot_set_programmer_flag_false
  statement: '$waif:new().programmer = 0;

    '
  expect:
    error: E_PERM
- name: waif_programmer_cannot_set_programmer_flag_true
  statement: '$waif:new().programmer = 1;

    '
  expect:
    error: E_PERM
- name: waif_wizard_cannot_set_programmer_flag_false
  permission: wizard
  statement: '$waif:new().programmer = 0;

    '
  expect:
    error: E_PERM
- name: waif_wizard_cannot_set_programmer_flag_true
  permission: wizard
  statement: '$waif:new().programmer = 1;

    '
  expect:
    error: E_PERM
- name: waifs_cant_reference_each_other
  setup:
    code: 'temp_class = create($waif);

      add_property(temp_class, ":other_waif", 0, {player, ""});

      '
  statement: 'a = temp_class:new();

    b = temp_class:new();

    a.other_waif = b;

    b.other_waif = a;

    '
  expect:
    error: E_RECMOVE
- name: recycling_parent_invalidates_waif
  setup:
    code: 'temp_class = create($waif);

      '
  statement: 'w = temp_class:new();

    recycle(temp_class);

    return w.class == #-1;

    '
  expect:
    value: 1
- name: anon_cant_be_waif_parent
  setup:
    code: 'temp_obj = create($object);

      add_verb(temp_obj, {player, "xd", "new"}, {"this", "none", "this"});

      set_verb_code(temp_obj, "new", {"return new_waif();"});

      '
  statement: 'anon = create(temp_obj, 1);

    return anon:new();

    '
  expect:
    error: E_INVARG
- name: task_stack_returns_valid_waifs_for_owners
  statement: |
    o = create($waif);
    add_verb(o, {player, "xd", ":a"}, {"this", "none", "this"});
    set_verb_code(o, ":a", {"suspend();"});
    add_verb(o, {player, "xd", ":b"}, {"this", "none", "this"});
    set_verb_code(o, ":b", {"return this:a();"});
    add_verb(o, {player, "xd", ":c"}, {"this", "none", "this"});
    set_verb_code(o, ":c", {
      "fork t (0)",
      "  c = this:b();",
      "endfork",
      "suspend(0);",
      "stack = task_stack(t);",
      "result = {{stack[1][2], typeof(stack[1][1]) == WAIF, stack[1][4] == this.class}, {stack[2][2], typeof(stack[2][1]) == WAIF, stack[2][4] == this.class}, {stack[3][2], typeof(stack[3][1]) == WAIF, stack[3][4] == this.class}};",
      "kill_task(t);",
      "return result;"
    });
    w = o:new();
    result = w:c();
    recycle(o);
    return result;
  expect:
    value:
    - [':a', 1, 1]
    - [':b', 1, 1]
    - [':c', 1, 1]
- name: queued_tasks_returns_valid_waifs_for_programmers
  statement: |
    o = create($waif);
    add_verb(o, {player, "xd", ":a"}, {"this", "none", "this"});
    set_verb_code(o, ":a", {"suspend();"});
    add_verb(o, {player, "xd", ":b"}, {"this", "none", "this"});
    set_verb_code(o, ":b", {"return this:a();"});
    add_verb(o, {player, "xd", ":c"}, {"this", "none", "this"});
    set_verb_code(o, ":c", {
      "for delay in ({0, 100})",
      "  fork (delay)",
      "    c = this:b();",
      "  endfork",
      "endfor",
      "suspend(0);",
      "q = queued_tasks();",
      "result = {length(q), {q[1][7], q[1][6] == this.class, typeof(q[1][9]) == WAIF}, {q[2][7], q[2][6] == this.class, typeof(q[2][9]) == WAIF}};",
      "kill_task(q[1][1]);",
      "kill_task(q[2][1]);",
      "return result;"
    });
    w = o:new();
    result = w:c();
    recycle(o);
    return result;
  expect:
    value:
    - 2
    - [':c', 1, 1]
    - [':a', 1, 1]
- name: nested_waif_map_indexes
  setup:
    code: 'waif_class = create($waif);

      add_property(waif_class, ":data", [], {player, ""});

      '
  statement: 'w = waif_class:new();

    w.data = ["outer" -> ["inner" -> "value"]];

    return w.data["outer"]["inner"];

    '
  expect:
    value: value
- name: deeply_nested_waif_map_indexes
  setup:
    code: 'waif_class = create($waif);

      add_property(waif_class, ":data", [], {player, ""});

      '
  statement: 'w = waif_class:new();

    w.data = ["a" -> ["b" -> ["c" -> 42]]];

    return w.data["a"]["b"]["c"];

    '
  expect:
    value: 42
- name: waif_colon_properties_are_instance_properties
  statement: |
    x = create($waif);
    add_property(x, ":x", 123, {player, ""});
    y = create(x);
    add_property(y, ":y", "abc", {player, ""});
    z = create(y);
    add_property(z, ":z", {1}, {player, ""});
    q = create(z);
    add_property(q, "q", "wxyz", {player, ""});
    w = z:new();
    wq = q:new();
    try
      missing = wq.q;
    except e (ANY)
      missing = e[1];
    endtry
    result = {w.x, w.y, w.z[1], missing, wq.class.q};
    recycle(q);
    recycle(z);
    recycle(y);
    recycle(x);
    return result;
  expect:
    value: [123, abc, 1, E_PROPNF, wxyz]

- name: properties_rejects_waif_instance
  description: properties() treats a waif instance as invalid even though instance
    property access works
  statement: |
    waif_class = create($waif);
    add_property(waif_class, ":alpha", 1, {player, "r"});
    w = waif_class:new();
    try
      result = properties(w);
    except e (ANY)
      result = e[1];
    endtry
    recycle(waif_class);
    return result;
  expect:
    value: E_INVARG

- name: property_info_rejects_waif_instance_property
  description: property_info() treats a waif instance property as invalid even when
    it is readable through dot syntax
  statement: |
    waif_class = create($waif);
    add_property(waif_class, ":alpha", 1, {player, "r"});
    w = waif_class:new();
    readable = w.alpha;
    try
      result = property_info(w, "alpha");
    except e (ANY)
      result = {readable, e[1]};
    endtry
    recycle(waif_class);
    return result;
  expect:
    value: [1, E_INVARG]

- name: is_clear_property_rejects_waif_instance_property
  description: is_clear_property() treats a waif instance property as invalid even
    when it exists on the waif
  statement: |
    waif_class = create($waif);
    add_property(waif_class, ":alpha", 1, {player, ""});
    w = waif_class:new();
    w.alpha = 2;
    try
      result = is_clear_property(w, "alpha");
    except e (ANY)
      result = {w.alpha, e[1]};
    endtry
    recycle(waif_class);
    return result;
  expect:
    value: [2, E_INVARG]

- name: waif_wildcard_verb_abbreviated_call
  description: A waif verb defined with a wildcard name (:greet*ing) is callable via its minimum abbreviation (greet)
  statement: |
    c = create($waif);
    add_verb(c, {player, "xd", ":greet*ing"}, {"this", "none", "this"});
    set_verb_code(c, ":greeting", {"return \"hello\";"});
    w = c:new();
    result = w:greet();
    recycle(c);
    return result;
  expect:
    value: hello

- name: waif_wildcard_verb_full_name_call
  description: A waif verb defined with a wildcard name (:greet*ing) is callable via its full expanded name (greeting)
  statement: |
    c = create($waif);
    add_verb(c, {player, "xd", ":greet*ing"}, {"this", "none", "this"});
    set_verb_code(c, ":greeting", {"return \"hello\";"});
    w = c:new();
    result = w:greeting();
    recycle(c);
    return result;
  expect:
    value: hello

- name: waif_colon_star_catchall_matches_any_call
  description: A waif verb named :* catches any verb call on a waif instance
  statement: |
    c = create($waif);
    add_verb(c, {player, "xd", ":*"}, {"this", "none", "this"});
    set_verb_code(c, ":*", {"return 42;"});
    w = c:new();
    result = w:anything();
    recycle(c);
    return result;
  expect:
    value: 42

- name: waif_colon_star_matches_preexisting_instance
  description: A :* verb added to the class after instance creation is visible to existing waif instances
  statement: |
    c = create($waif);
    w = c:new();
    add_verb(c, {player, "xd", ":*"}, {"this", "none", "this"});
    set_verb_code(c, ":*", {"return 42;"});
    result = w:anything();
    recycle(c);
    return result;
  expect:
    value: 42

- name: waif_bare_star_matches_preexisting_instance
  description: A bare * verb added to the class after instance creation also dispatches on waif calls
  statement: |
    c = create($waif);
    w = c:new();
    add_verb(c, {player, "xd", "*"}, {"this", "none", "this"});
    result = w:anything();
    recycle(c);
    return result;
  expect:
    value: 0

- name: waif_object_call_ignores_waif_only_verbs
  description: Calling a verb directly on the class object does not find verbs with a colon prefix
  statement: |
    c = create($waif);
    add_verb(c, {player, "xd", ":foo"}, {"this", "none", "this"});
    set_verb_code(c, ":foo", {"return 99;"});
    try
      result = c:foo();
    except e (ANY)
      result = e[1];
    endtry
    recycle(c);
    return result;
  expect:
    value: E_VERBNF

- name: waif_bare_wildcard_prefix_verb_not_found
  description: A waif verb named *test (without colon prefix) is not found for any call on a waif instance
  statement: |
    c = create($waif);
    add_verb(c, {player, "xd", "*test"}, {"this", "none", "this"});
    w = c:new();
    try
      w:test();
    except e (ANY)
      result = e[1];
    endtry
    recycle(c);
    return result;
  expect:
    value: E_VERBNF

- name: waif_colon_verbs_are_instance_verbs
  statement: |
    x = create($waif);
    add_verb(x, {player, "xd", ":x"}, {"this", "none", "this"});
    set_verb_code(x, ":x", {"return 123;"});
    y = create(x);
    add_verb(y, {player, "xd", ":y"}, {"this", "none", "this"});
    set_verb_code(y, ":y", {"return \"abc\";"});
    z = create(y);
    add_verb(z, {player, "xd", ":z"}, {"this", "none", "this"});
    set_verb_code(z, ":z", {"return {1};"});
    q = create(z);
    add_verb(q, {player, "xd", "q"}, {"this", "none", "this"});
    set_verb_code(q, "q", {"return \"class-only\";"});
    w = z:new();
    wq = q:new();
    try
      missing = wq:q();
    except e (ANY)
      missing = e[1];
    endtry
    result = {w:x(), w:y(), w:z()[1], missing, wq.class:q()};
    recycle(q);
    recycle(z);
    recycle(y);
    recycle(x);
    return result;
  expect:
    value: [123, abc, 1, E_VERBNF, class-only]

- name: waif_lost_reference_calls_recycle
  steps:
    - run: |
        a = create($waif);
        add_property(a, "recycle_called", 0, {player, ""});
        add_verb(a, {player, "xd", ":recycle"}, {"this", "none", "this"});
        set_verb_code(a, ":recycle", {
          "typeof(this) == WAIF || raise(E_INVARG);",
          tostr(a) + ".recycle_called = " + tostr(a) + ".recycle_called + 1;"
        });
        return a;
      capture: waif_class
    - run: "{waif_class}.recycle_called"
      expect:
        value: 0
    - run: |
        w = {waif_class}:new();
        return 0;
      expect:
        value: 0
    - run: "{waif_class}.recycle_called"
      expect:
        value: 1
  cleanup:
    - run: "recycle({waif_class});"

- name: waif_recycle_hook_runs_once_even_if_it_stashes_self
  steps:
    - run: |
        a = create($waif);
        add_property(a, "reference", 0, {player, ""});
        add_property(a, "recycle_called", 0, {player, ""});
        add_verb(a, {player, "xd", ":recycle"}, {"this", "none", "this"});
        set_verb_code(a, ":recycle", {
          "typeof(this) == WAIF || raise(E_INVARG);",
          tostr(a) + ".recycle_called = " + tostr(a) + ".recycle_called + 1;",
          tostr(a) + ".reference = this;"
        });
        return a;
      capture: waif_class
    - run: |
        w = {waif_class}:new();
        return 0;
      expect:
        value: 0
    - run: "{waif_class}.recycle_called"
      expect:
        value: 1
    - run: "{waif_class}.reference = 0"
      expect:
        value: 0
    - run: "{waif_class}.recycle_called"
      expect:
        value: 1
  cleanup:
    - run: "recycle({waif_class});"
