    error: E_TYPE
- name: rindex_arg_2_rejects_wrong_type
  permission: wizard
  code: rindex("x", 1)
  expect:
    error: E_TYPE
- name: rindex_arg_4_rejects_wrong_type
  permission: wizard
  code: rindex("x", "x", 1, "x")
  expect:
    error: E_TYPE
