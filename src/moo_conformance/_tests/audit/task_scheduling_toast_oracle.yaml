name: audit_task_scheduling_toast_oracle
description: Toast-confirmed audit cases for task limits, scheduling, read(), and queued task metadata.

requires:
  builtins:
    - add_property
    - delete_property
    - create
    - recycle
    - valid
    - set_player_flag
    - boot_player
    - add_verb
    - delete_verb
    - verb_info
    - set_verb_info
    - verb_args
    - set_verb_args
    - verb_code
    - set_verb_code
    - load_server_options
    - ticks_left
    - seconds_left
    - task_id
    - suspend
    - fork
    - queued_tasks
    - kill_task
    - read
    - force_input
    - connected_players
    - yin
    - dump_database

tests:
  - name: audit_default_fg_ticks
    description: Foreground tasks use Toast's compiled default tick budget when no server option overrides it.
    steps:
      - run: |
          try
            delete_property($server_options, "fg_ticks");
          except (ANY)
          endtry
          load_server_options();
          return 1;
        as: wizard
      - run: "return ticks_left() <= 60000 && ticks_left() > 59000;"
        as: wizard
        expect:
          value: 1

  - name: audit_default_bg_ticks
    description: Background forked tasks use Toast's compiled default tick budget when no server option overrides it.
    steps:
      - run: |
          try
            delete_property($server_options, "bg_ticks");
          except (ANY)
          endtry
          try
            add_property(#0, "audit_bg_ticks", 0, {#0, "rw"});
          except (E_INVARG)
          endtry
          load_server_options();
          return 1;
        as: wizard
      - run: |
          fork (0)
            #0.audit_bg_ticks = ticks_left();
          endfork
          suspend(0);
          return #0.audit_bg_ticks <= 30000 && #0.audit_bg_ticks > 29500;
        as: wizard
        expect:
          value: 1
    cleanup:
      - run: |
          try
            delete_property(#0, "audit_bg_ticks");
          except (ANY)
          endtry
        as: wizard

  - name: audit_server_options_fg_ticks_runtime
    description: $server_options.fg_ticks is honored for new foreground tasks.
    steps:
      - run: |
          try
            add_property($server_options, "fg_ticks", 12345, {player, "r"});
          except (E_INVARG)
            $server_options.fg_ticks = 12345;
          endtry
          load_server_options();
          return 1;
        as: wizard
      - run: "return ticks_left() <= 12345 && ticks_left() > 12000;"
        as: wizard
        expect:
          value: 1
    cleanup:
      - run: |
          delete_property($server_options, "fg_ticks");
          load_server_options();
        as: wizard

  - name: audit_server_options_bg_ticks_runtime
    description: $server_options.bg_ticks is honored for new background tasks.
    steps:
      - run: |
          try
            add_property($server_options, "bg_ticks", 23456, {player, "r"});
          except (E_INVARG)
            $server_options.bg_ticks = 23456;
          endtry
          try
            add_property(#0, "audit_bg_ticks", 0, {#0, "rw"});
          except (E_INVARG)
          endtry
          load_server_options();
          return 1;
        as: wizard
      - run: |
          fork (0)
            #0.audit_bg_ticks = ticks_left();
          endfork
          suspend(0);
          return #0.audit_bg_ticks <= 23456 && #0.audit_bg_ticks > 23000;
        as: wizard
        expect:
          value: 1
    cleanup:
      - run: |
          delete_property($server_options, "bg_ticks");
          delete_property(#0, "audit_bg_ticks");
          load_server_options();
        as: wizard

  - name: audit_server_options_fg_seconds_runtime
    description: $server_options.fg_seconds is honored for new foreground tasks.
    steps:
      - run: |
          try
            add_property($server_options, "fg_seconds", 12, {player, "r"});
          except (E_INVARG)
            $server_options.fg_seconds = 12;
          endtry
          load_server_options();
          return 1;
        as: wizard
      - run: "return seconds_left() <= 12 && seconds_left() > 8;"
        as: wizard
        expect:
          value: 1
    cleanup:
      - run: |
          delete_property($server_options, "fg_seconds");
          load_server_options();
        as: wizard

  - name: audit_server_options_bg_seconds_runtime
    description: $server_options.bg_seconds is honored for new background tasks.
    steps:
      - run: |
          try
            add_property($server_options, "bg_seconds", 9, {player, "r"});
          except (E_INVARG)
            $server_options.bg_seconds = 9;
          endtry
          try
            add_property(#0, "audit_bg_seconds", 0, {#0, "rw"});
          except (E_INVARG)
          endtry
          load_server_options();
          return 1;
        as: wizard
      - run: |
          fork (0)
            #0.audit_bg_seconds = seconds_left();
          endfork
          suspend(0);
          return #0.audit_bg_seconds <= 9 && #0.audit_bg_seconds > 5;
        as: wizard
        expect:
          value: 1
    cleanup:
      - run: |
          delete_property($server_options, "bg_seconds");
          delete_property(#0, "audit_bg_seconds");
          load_server_options();
        as: wizard

  - name: audit_server_options_max_stack_depth_runtime
    description: $server_options.max_stack_depth is honored for recursive verb calls.
    steps:
      - run: |
          obj = create($nothing);
          add_verb(obj, {player, "xd", "audit_depth"}, {"this", "none", "this"});
          set_verb_code(obj, "audit_depth", {"return this:audit_depth();"});
          try
            add_property($server_options, "max_stack_depth", 8, {player, "r"});
          except (E_INVARG)
            $server_options.max_stack_depth = 8;
          endtry
          load_server_options();
          return obj;
        capture: obj
        as: wizard
      - run: "{obj}:audit_depth();"
        as: wizard
        expect:
          error: E_MAXREC
    cleanup:
      - run: |
          recycle({obj});
          delete_property($server_options, "max_stack_depth");
          load_server_options();
        as: wizard

  - name: audit_suspend_zero_yields_to_ready_task
    description: suspend(0) gives a ready forked task a turn before the original task resumes.
    steps:
      - run: |
          try
            add_property(#0, "audit_suspend_order", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          #0.audit_suspend_order = {"main-before"};
          fork (0)
            #0.audit_suspend_order = listappend(#0.audit_suspend_order, "fork");
          endfork
          suspend(0);
          #0.audit_suspend_order = listappend(#0.audit_suspend_order, "main-after");
          return #0.audit_suspend_order;
        as: wizard
        expect:
          value:
            - main-before
            - fork
            - main-after
    cleanup:
      - run: 'delete_property(#0, "audit_suspend_order");'
        as: wizard

  - name: audit_background_task_id_stable_across_suspend_and_fork
    description: A background task keeps its task id across suspension and resumes after its ready child fork.
    steps:
      - run: |
          for prop in ({"audit_heartbeat_task_id", "audit_heartbeat_same_id", "audit_heartbeat_forks", "audit_heartbeat_result"})
            try
              add_property(#0, prop, 0, {#0, "rw"});
            except (E_INVARG)
            endtry
          endfor
          #0.audit_heartbeat_task_id = 0;
          #0.audit_heartbeat_same_id = 0;
          #0.audit_heartbeat_forks = 0;
          #0.audit_heartbeat_result = {};
          fork heartbeat_id (0)
            original_id = task_id();
            #0.audit_heartbeat_task_id = original_id;
            suspend(0);
            #0.audit_heartbeat_same_id = task_id() == original_id;
            fork (0)
              #0.audit_heartbeat_forks = #0.audit_heartbeat_forks + 1;
            endfork
            suspend(0);
            #0.audit_heartbeat_result = {task_id() == original_id, #0.audit_heartbeat_forks};
          endfork
          return heartbeat_id;
        capture: heartbeat_id
        as: wizard
      - wait: 500
      - run: |
          return {#0.audit_heartbeat_task_id == {heartbeat_id}, #0.audit_heartbeat_same_id, #0.audit_heartbeat_result};
        as: wizard
        expect:
          value:
            - 1
            - 1
            -
              - 1
              - 1
    cleanup:
      - run: |
          for prop in ({"audit_heartbeat_task_id", "audit_heartbeat_same_id", "audit_heartbeat_forks", "audit_heartbeat_result"})
            try
              delete_property(#0, prop);
            except (ANY)
            endtry
          endfor
        as: wizard

  - name: audit_forked_try_except_rebases_handler_ip
    description: A forked try/except handles its exception within the extracted fork body.
    steps:
      - run: |
          try
            add_property(#0, "audit_fork_except_result", 0, {#0, "rw"});
          except (E_INVARG)
            #0.audit_fork_except_result = 0;
          endtry
          fork (0)
            try
              raise(E_INVARG);
            except e (ANY)
              #0.audit_fork_except_result = e[1];
            endtry
          endfork
          suspend(0);
          return #0.audit_fork_except_result;
        as: wizard
        expect:
          value: E_INVARG
      - assert_log:
          not_contains: "panic in task"
    cleanup:
      - run: 'delete_property(#0, "audit_fork_except_result");'
        as: wizard

  - name: audit_input_admitted_between_ready_background_tasks
    description: A fresh input task is admitted before an existing batch of ready background tasks is drained.
    timeout_ms: 15000
    steps:
      - run: |
          saved_ticks = {0, 0};
          saved_seconds = {0, 0};
          try
            saved_ticks = {1, $server_options.bg_ticks};
          except (E_PROPNF)
          endtry
          try
            saved_seconds = {1, $server_options.bg_seconds};
          except (E_PROPNF)
          endtry
          try
            add_property(#0, "audit_input_fairness_options", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          #0.audit_input_fairness_options = {saved_ticks, saved_seconds};
          try
            add_property($server_options, "bg_ticks", 10000000, {player, "r"});
          except (E_INVARG)
            $server_options.bg_ticks = 10000000;
          endtry
          try
            add_property($server_options, "bg_seconds", 30, {player, "r"});
          except (E_INVARG)
            $server_options.bg_seconds = 30;
          endtry
          load_server_options();
          try
            add_property(#0, "audit_input_fairness_started", 0, {#0, "rw"});
          except (E_INVARG)
          endtry
          try
            add_property(#0, "audit_input_fairness_tasks", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          #0.audit_input_fairness_started = 0;
          #0.audit_input_fairness_tasks = {};
          for n in ({1, 2, 3, 4, 5, 6})
            fork id (0)
              #0.audit_input_fairness_started = #0.audit_input_fairness_started + 1;
              i = 0;
              while (i < 1000000)
                i = i + 1;
              endwhile
            endfork
            #0.audit_input_fairness_tasks = listappend(#0.audit_input_fairness_tasks, id);
          endfor
          return 1;
        as: wizard
      - wait: 25
      - run: "return #0.audit_input_fairness_started < 6;"
        as: wizard
        expect:
          value: 1
    cleanup:
      - run: |
          for id in (#0.audit_input_fairness_tasks)
            try
              kill_task(id);
            except (E_INVARG)
            endtry
          endfor
          saved = #0.audit_input_fairness_options;
          if (saved[1][1])
            $server_options.bg_ticks = saved[1][2];
          else
            delete_property($server_options, "bg_ticks");
          endif
          if (saved[2][1])
            $server_options.bg_seconds = saved[2][2];
          else
            delete_property($server_options, "bg_seconds");
          endif
          load_server_options();
          delete_property(#0, "audit_input_fairness_tasks");
          delete_property(#0, "audit_input_fairness_started");
          delete_property(#0, "audit_input_fairness_options");
        as: wizard

  - name: audit_read_unrelated_player_denied
    description: read(other_player, nonblocking) denies unrelated non-wizard programmers.
    steps:
      - run: "return player;"
        capture: wiz
        as: wizard
      - run: "read({wiz}, 1)"
        as: programmer
        expect:
          error: E_PERM

  - name: audit_read_nonblocking_from_fork_returns_zero
    description: Nonblocking read() from a forked task returns 0 when no input is available.
    steps:
      - run: |
          try
            add_property(#0, "audit_read_error", $nothing, {#0, "rw"});
          except (E_INVARG)
          endtry
          fork (0)
            #0.audit_read_error = read(player, 1);
          endfork
          suspend(0);
          return #0.audit_read_error;
        as: wizard
        expect:
          value: 0
    cleanup:
      - run: 'delete_property(#0, "audit_read_error");'
        as: wizard

  - name: audit_queued_task_reported_budget_shape
    description: queued_tasks() reports Toast task ids, start times, and frame lists for delayed tasks.
    steps:
      - run: |
          fork id (30)
            1 + 1;
          endfork
          return id;
        capture: task_id
        as: wizard
      - run: |
          for task in (queued_tasks())
            if (task[1] == {task_id})
              return {typeof(task[1]), typeof(task[2]), typeof(task[3]), task[2] > time()};
            endif
          endfor
          return {};
        as: wizard
        expect:
          value:
            - 0
            - 0
            - 0
            - 1
    cleanup:
      - run: "kill_task({task_id});"
        as: wizard

  - name: audit_read_no_arg_from_fork_denied
    description: read() with no explicit connection is denied outside the last input task context.
    steps:
      - run: |
          try
            add_property(#0, "audit_read_noarg_error", $nothing, {#0, "rw"});
          except (E_INVARG)
          endtry
          fork (0)
            #0.audit_read_noarg_error = `read() ! E_PERM => E_PERM';
          endfork
          suspend(0);
          return #0.audit_read_noarg_error;
        as: wizard
        expect:
          value: E_PERM
    cleanup:
      - run: 'delete_property(#0, "audit_read_noarg_error");'
        as: wizard

  - name: audit_tick_exhaustion_not_catchable
    description: Tick exhaustion aborts the task before MOO try/except can swallow it.
    steps:
      - run: |
          try
            add_property($server_options, "fg_ticks", 100, {player, "r"});
          except (E_INVARG)
            $server_options.fg_ticks = 100;
          endtry
          load_server_options();
          return 1;
        as: wizard
      - run: |
          try
            i = 0;
            while (1)
              i = i + 1;
            endwhile
          except (ANY)
            return "caught";
          endtry
          return "completed";
        as: wizard
        expect:
          match: "Task ran out of ticks"
    cleanup:
      - run: |
          delete_property($server_options, "fg_ticks");
          load_server_options();
        as: wizard

  - name: audit_handle_task_timeout_invoked
    description: Toast invokes #0:handle_task_timeout with resource, stack, and traceback after task timeout.
    steps:
      - run: |
          try
            add_property(#0, "audit_timeout_seen", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          try
            add_property(#0, "audit_timeout_saved", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          old_exists = 1;
          try
            old_info = verb_info(#0, "handle_task_timeout");
            old_args = verb_args(#0, "handle_task_timeout");
            old_code = verb_code(#0, "handle_task_timeout");
          except (E_VERBNF)
            old_exists = 0;
            old_info = {};
            old_args = {};
            old_code = {};
          endtry
          #0.audit_timeout_saved = {old_exists, old_info, old_args, old_code};
          try
            add_verb(#0, {#0, "rxd", "handle_task_timeout"}, {"this", "none", "this"});
          except (E_INVARG)
          endtry
          set_verb_info(#0, "handle_task_timeout", {#0, "rxd", "handle_task_timeout"});
          set_verb_args(#0, "handle_task_timeout", {"this", "none", "this"});
          set_verb_code(#0, "handle_task_timeout", {
            "#0.audit_timeout_seen = {args[1], typeof(args[2]) == LIST, typeof(args[3]) == LIST, length(args[2]) > 0, index(args[3][1], \"Task ran out of ticks\") != 0};",
            "return 1;"
          });
          try
            add_property($server_options, "bg_ticks", 100, {player, "r"});
          except (E_INVARG)
            $server_options.bg_ticks = 100;
          endtry
          load_server_options();
          return 1;
        as: wizard
      - run: |
          #0.audit_timeout_seen = {};
          fork (0)
            i = 0;
            while (1)
              i = i + 1;
            endwhile
          endfork
          suspend(1);
          return #0.audit_timeout_seen;
        as: wizard
        expect:
          value:
            - ticks
            - 1
            - 1
            - 1
            - 1
    cleanup:
      - run: |
          try
            saved = #0.audit_timeout_saved;
            if (saved[1])
              set_verb_info(#0, "handle_task_timeout", saved[2]);
              set_verb_args(#0, "handle_task_timeout", saved[3]);
              set_verb_code(#0, "handle_task_timeout", saved[4]);
            else
              delete_verb(#0, "handle_task_timeout");
            endif
          except (ANY)
          endtry
          try
            delete_property(#0, "audit_timeout_saved");
          except (ANY)
          endtry
          try
            delete_property(#0, "audit_timeout_seen");
          except (ANY)
          endtry
          try
            delete_property($server_options, "bg_ticks");
          except (ANY)
          endtry
          load_server_options();
        as: wizard

  - name: audit_suspended_task_survives_restart
    description: A delayed forked task survives dump_database() and a managed server restart.
    steps:
      - run: |
          try
            add_property(#0, "audit_restart_task_seen", "before", {#0, "rw"});
          except (E_INVARG)
            #0.audit_restart_task_seen = "before";
          endtry
          fork (4)
            #0.audit_restart_task_seen = "after";
          endfork
          return #0.audit_restart_task_seen;
        as: wizard
        expect:
          value: before
      - run: "return dump_database();"
        as: wizard
        expect:
          value: 0
      - wait: 1500
      - restart_server:
          wait_ms: 500
      - wait: 4500
      - run: "return #0.audit_restart_task_seen;"
        as: wizard
        expect:
          value: after
    cleanup:
      - run: |
          try
            delete_property(#0, "audit_restart_task_seen");
          except (ANY)
          endtry
        as: wizard

  - name: audit_pending_forked_task_survives_genuine_offline_restart
    description: >
      A forked task whose original scheduled run time has already elapsed by
      the time the server comes back up (genuine offline downtime, not just a
      fast restart) still runs cleanly, with no error logged.
    steps:
      - run: |
          try
            add_property($server_options, "bg_seconds", 2, {player, "r"});
          except (E_INVARG)
            $server_options.bg_seconds = 2;
          endtry
          load_server_options();
          try
            add_property(#0, "audit_offline_marker", "before", {#0, "rw"});
          except (E_INVARG)
            #0.audit_offline_marker = "before";
          endtry
          fork (3)
            #0.audit_offline_marker = "after";
          endfork
          return #0.audit_offline_marker;
        as: wizard
        expect:
          value: before
      - run: "return dump_database();"
        as: wizard
        expect:
          value: 0
      - wait: 1500
      - restart_server:
          down_ms: 8000
      - run: "return #0.audit_offline_marker;"
        as: wizard
        expect:
          value: after
      - assert_log:
          not_contains: "context deadline exceeded"
    cleanup:
      - run: |
          try
            delete_property($server_options, "bg_seconds");
          except (ANY)
          endtry
          try
            delete_property(#0, "audit_offline_marker");
          except (ANY)
          endtry
          load_server_options();
        as: wizard

  - name: audit_force_input_live_login_connection
    description: force_input() to a live negative connection runs the login input path and can log it in.
    steps:
      - run: |
          try
            add_property(#0, "audit_force_login_seen", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          try
            add_property(#0, "audit_force_login_saved", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          try
            add_property(#0, "audit_force_login_player", $nothing, {#0, "rw"});
          except (E_INVARG)
          endtry
          login_player = create($nothing);
          set_player_flag(login_player, 1);
          #0.audit_force_login_player = login_player;
          old_exists = 1;
          try
            old_info = verb_info(#0, "do_login_command");
            old_args = verb_args(#0, "do_login_command");
            old_code = verb_code(#0, "do_login_command");
          except (E_VERBNF)
            old_exists = 0;
            old_info = {};
            old_args = {};
            old_code = {};
          endtry
          #0.audit_force_login_saved = {old_exists, old_info, old_args, old_code};
          try
            add_verb(#0, {#0, "rxd", "do_login_command"}, {"this", "none", "this"});
          except (E_INVARG)
          endtry
          set_verb_info(#0, "do_login_command", {#0, "rxd", "do_login_command"});
          set_verb_args(#0, "do_login_command", {"this", "none", "this"});
          set_verb_code(#0, "do_login_command", {
            "#0.audit_force_login_seen = {!valid(player), args, argstr};",
            "return #0.audit_force_login_player;"
          });
          return 1;
        as: wizard
      - new_connection:
          capture: conn1
      - run: |
          neg = #-1;
          for conn in (connected_players(1))
            if (!valid(conn))
              neg = conn;
            endif
          endfor
          force_input(neg, "audit-force-login");
          suspend(0);
          return {#0.audit_force_login_seen, (neg in connected_players(1)) > 0};
        as: wizard
        expect:
          value:
            -
              - 1
              -
                - audit-force-login
              - audit-force-login
            - 0
      - close_connection: conn1
    cleanup:
      - run: |
          try
            saved = #0.audit_force_login_saved;
            if (saved[1])
              set_verb_info(#0, "do_login_command", saved[2]);
              set_verb_args(#0, "do_login_command", saved[3]);
              set_verb_code(#0, "do_login_command", saved[4]);
            else
              delete_verb(#0, "do_login_command");
            endif
          except (ANY)
          endtry
          try
            delete_property(#0, "audit_force_login_saved");
          except (ANY)
          endtry
          try
            delete_property(#0, "audit_force_login_seen");
          except (ANY)
          endtry
          try
            boot_player(#0.audit_force_login_player);
          except (ANY)
          endtry
          try
            recycle(#0.audit_force_login_player);
          except (ANY)
          endtry
          try
            delete_property(#0, "audit_force_login_player");
          except (ANY)
          endtry
        as: wizard

  - name: audit_yin_yields_when_thresholds_crossed
    description: yin() yields to a ready task when remaining ticks fall below the requested threshold.
    steps:
      - run: |
          try
            add_property(#0, "audit_yin_order", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          try
            add_property($server_options, "fg_ticks", 60000, {player, "r"});
          except (E_INVARG)
            $server_options.fg_ticks = 60000;
          endtry
          load_server_options();
          #0.audit_yin_order = {"main-before"};
          fork (0)
            #0.audit_yin_order = listappend(#0.audit_yin_order, "fork");
          endfork
          yin(0, 59999, 4);
          #0.audit_yin_order = listappend(#0.audit_yin_order, "main-after");
          return #0.audit_yin_order;
        as: wizard
        expect:
          value:
            - main-before
            - fork
            - main-after
    cleanup:
      - run: |
          delete_property(#0, "audit_yin_order");
          delete_property($server_options, "fg_ticks");
          load_server_options();
        as: wizard

  - name: audit_resume_after_suspend_uses_background_limits
    description: A suspended foreground task resumes with Toast background tick and second budgets.
    steps:
      - run: |
          try
            add_property($server_options, "fg_ticks", 50000, {player, "r"});
          except (E_INVARG)
            $server_options.fg_ticks = 50000;
          endtry
          try
            add_property($server_options, "bg_ticks", 9000, {player, "r"});
          except (E_INVARG)
            $server_options.bg_ticks = 9000;
          endtry
          try
            add_property($server_options, "bg_seconds", 7, {player, "r"});
          except (E_INVARG)
            $server_options.bg_seconds = 7;
          endtry
          load_server_options();
          before_ticks = ticks_left();
          suspend(0);
          after_ticks = ticks_left();
          after_seconds = seconds_left();
          return {before_ticks <= 50000 && before_ticks > 49000, after_ticks <= 9000 && after_ticks > 8500, after_seconds <= 7 && after_seconds > 4};
        as: wizard
        expect:
          value:
            - 0
            - 1
            - 1
    cleanup:
      - run: |
          delete_property($server_options, "fg_ticks");
          delete_property($server_options, "bg_ticks");
          delete_property($server_options, "bg_seconds");
          load_server_options();
        as: wizard

  - name: audit_long_suspended_background_task_can_yield_after_wake
    description: Time spent suspended does not consume a background task's execution-second budget.
    steps:
      - run: |
          try
            add_property($server_options, "bg_seconds", 1, {player, "r"});
          except (E_INVARG)
            $server_options.bg_seconds = 1;
          endtry
          try
            add_property(#0, "audit_long_suspend_progress", "", {#0, "rw"});
          except (E_INVARG)
          endtry
          load_server_options();
          #0.audit_long_suspend_progress = "created";
          fork (0)
            #0.audit_long_suspend_progress = "before";
            suspend(2);
            #0.audit_long_suspend_progress = "after-long-suspend";
            suspend(0);
            #0.audit_long_suspend_progress = "after-yield";
          endfork
          suspend(0);
          return #0.audit_long_suspend_progress;
        as: wizard
        expect:
          value: before
      - wait: 3500
      - run: "return #0.audit_long_suspend_progress;"
        as: wizard
        expect:
          value: after-yield
    cleanup:
      - run: |
          try
            delete_property(#0, "audit_long_suspend_progress");
          except (ANY)
          endtry
          try
            delete_property($server_options, "bg_seconds");
          except (ANY)
          endtry
          load_server_options();
        as: wizard
