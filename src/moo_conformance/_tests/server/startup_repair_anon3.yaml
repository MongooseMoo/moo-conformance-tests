name: startup_repair_anon3
description: Cleans up garbage from ToastStunt's Anon3 canned DB.
server_db: Anon3.db
requires:
  config:
    - managed_server
    - server_dir
    - log_file
    - server_db_dir
tests:
  - name: garbage_cleanup_is_written_to_output_db
    steps:
      - wait: 500
      - assert_log:
          contains: "recycle called"
      - assert_file:
          path: Anon3.db.new
          contains: "0 values pending finalization"
