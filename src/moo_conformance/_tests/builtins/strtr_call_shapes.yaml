name: strtr_call_shapes
description: Table-driven TYPE_ANY coverage for strtr().

requires:
  builtins:
    - strtr

tests:
  - name: strtr_case_flag_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [int, "1"]
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: 'strtr("Abc", "a", "x", {expr})'
    expect:
      type: str
