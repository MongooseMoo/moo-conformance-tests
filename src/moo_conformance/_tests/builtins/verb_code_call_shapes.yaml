name: verb_code_call_shapes
description: Product-table receiver, descriptor, and option call-shape coverage for verb_code().

requires:
  builtins:
    - verb_code

tests:
  - name: verb_code_two_args_rejects_missing_or_invalid_shape_{object_kind}_{desc_kind}
    permission: wizard
    table:
      product:
        - columns: [object_kind, object_expr]
          rows:
            - [int, "1"]
            - [float, "1.5"]
            - [obj, "#0"]
            - [str, '"x"']
            - [err, "E_ARGS"]
            - [list, "{}"]
            - [map, "[1 -> 2]"]
        - columns: [desc_kind, desc_expr]
          rows:
            - [int, "999999"]
            - [float, "1.5"]
            - [obj, "#0"]
            - [str, '"no_such_verb"']
            - [err, "E_ARGS"]
            - [list, "{}"]
            - [map, "[1 -> 2]"]
    code: "`verb_code({object_expr}, {desc_expr}) ! ANY => 1'"
    expect:
      value: 1

  - name: verb_code_three_args_rejects_missing_or_invalid_shape_{object_kind}_{desc_kind}_{parens_kind}
    permission: wizard
    table:
      product:
        - columns: [object_kind, object_expr]
          rows:
            - [int, "1"]
            - [float, "1.5"]
            - [obj, "#0"]
            - [str, '"x"']
            - [err, "E_ARGS"]
            - [list, "{}"]
            - [map, "[1 -> 2]"]
        - columns: [desc_kind, desc_expr]
          rows:
            - [int, "999999"]
            - [float, "1.5"]
            - [obj, "#0"]
            - [str, '"no_such_verb"']
            - [err, "E_ARGS"]
            - [list, "{}"]
            - [map, "[1 -> 2]"]
        - columns: [parens_kind, parens_expr]
          rows:
            - [int, "1"]
            - [float, "1.5"]
            - [obj, "#0"]
            - [str, '"x"']
            - [err, "E_ARGS"]
            - [list, "{}"]
            - [map, "[1 -> 2]"]
    code: "`verb_code({object_expr}, {desc_expr}, {parens_expr}) ! ANY => 1'"
    expect:
      value: 1

  - name: verb_code_four_args_rejects_missing_or_invalid_shape_{object_kind}_{desc_kind}_{parens_kind}_{indent_kind}
    permission: wizard
    table:
      product:
        - columns: [object_kind, object_expr]
          rows:
            - [int, "1"]
            - [float, "1.5"]
            - [obj, "#0"]
            - [str, '"x"']
            - [err, "E_ARGS"]
            - [list, "{}"]
            - [map, "[1 -> 2]"]
        - columns: [desc_kind, desc_expr]
          rows:
            - [int, "999999"]
            - [float, "1.5"]
            - [obj, "#0"]
            - [str, '"no_such_verb"']
            - [err, "E_ARGS"]
            - [list, "{}"]
            - [map, "[1 -> 2]"]
        - columns: [parens_kind, parens_expr]
          rows:
            - [int, "1"]
            - [float, "1.5"]
            - [obj, "#0"]
            - [str, '"x"']
            - [err, "E_ARGS"]
            - [list, "{}"]
            - [map, "[1 -> 2]"]
        - columns: [indent_kind, indent_expr]
          rows:
            - [int, "1"]
            - [float, "1.5"]
            - [obj, "#0"]
            - [str, '"x"']
            - [err, "E_ARGS"]
            - [list, "{}"]
            - [map, "[1 -> 2]"]
    code: "`verb_code({object_expr}, {desc_expr}, {parens_expr}, {indent_expr}) ! ANY => 1'"
