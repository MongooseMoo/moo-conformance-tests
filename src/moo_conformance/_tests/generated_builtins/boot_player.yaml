name: generated_builtin_signature_boot_player
description: Generated conformance tests for boot_player() builtin signature, derived
  from Toast source.
requires:
  builtins:
  - function_info
  - boot_player
tests:
- name: boot_player_function_info_signature_matches_source
  permission: wizard
  code: function_info("boot_player")
  expect:
    value:
    - boot_player
    - 1
    - 1
    - - 1
- name: boot_player_too_few_args
  permission: wizard
  code: boot_player()
  expect:
    error: E_ARGS
- name: boot_player_too_many_args
  permission: wizard
  code: boot_player(#0, 1)
  expect:
    error: E_ARGS
- name: boot_player_arg_1_rejects_wrong_type
  permission: wizard
  code: boot_player("x")
  expect:
    error: E_TYPE
- name: boot_player_runtime_outcome_matches_inferred_types
  permission: wizard
  statement: "try\n  result = boot_player(#0);\n  return typeof(result) == INT;\n\
    except e (E_PERM)\n  return 1;\nendtry\n"
  expect:
    value: 1
