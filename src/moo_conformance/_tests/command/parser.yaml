name: command_parser_basic
description: Basic tests for command parser and verb dispatch

tests:
  - name: verb_on_iobj_dispatches_correctly
    description: '"put X in Y" dispatches to Y''s put verb with correct parsed values'
    steps:
      # Create box with put verb
      - run: |
          obj = create($nothing);
          obj.name = "box";
          move(obj, player);
          add_verb(obj, {player, "xd", "put"}, {"any", "in", "this"});
          set_verb_code(obj, "put", {
            "notify(player, \"VERB:\" + verb);",
            "notify(player, \"ARGSTR:\" + argstr);",
            "notify(player, \"DOBJSTR:\" + dobjstr);",
            "notify(player, \"PREPSTR:\" + prepstr);",
            "notify(player, \"IOBJSTR:\" + iobjstr);"
          });
          return obj;
        capture: box
        as: wizard
      # Create ball
      - run: |
          obj = create($nothing);
          obj.name = "ball";
          move(obj, player);
          return obj;
        capture: ball
        as: wizard
      # Send raw command and verify parsed values
      - command: "put ball in box"
        expect:
          output:
            - "VERB:put"
            - "ARGSTR:ball in box"
            - "DOBJSTR:ball"
            - "PREPSTR:in"
            - "IOBJSTR:box"
    cleanup:
      - run: "recycle({box})"
        as: wizard
      - run: "recycle({ball})"
        as: wizard

  - name: failed_dobj_match_is_minus_3
    description: Non-existent dobj resolves to #-3 (FAILED_MATCH)
    steps:
      - run: |
          obj = create($nothing);
          obj.name = "box";
          move(obj, player);
          add_verb(obj, {player, "xd", "put"}, {"any", "in", "this"});
          set_verb_code(obj, "put", {
            "notify(player, \"DOBJ:\" + toliteral(dobj));"
          });
          return obj;
        capture: box
        as: wizard
      - command: "put rock in box"
        expect:
          output: "DOBJ:#-3"
    cleanup:
      - run: "recycle({box})"
        as: wizard

  - name: wrong_preposition_no_match
    description: Verb with "in" spec doesn't match "on" command
    steps:
      - run: |
          obj = create($nothing);
          obj.name = "box";
          move(obj, player);
          add_verb(obj, {player, "xd", "put"}, {"any", "in", "this"});
          set_verb_code(obj, "put", {"notify(player, \"CALLED\");"});
          return obj;
        capture: box
        as: wizard
      - command: "put ball on box"
        expect:
          output:
            contains: "couldn't understand"
    cleanup:
      - run: "recycle({box})"
        as: wizard

  - name: player_verb_dispatches
    description: Verbs on player are found by command dispatch
    steps:
      - run: |
          add_verb(player, {player, "xd", "wave"}, {"none", "none", "none"});
          return set_verb_code(player, "wave", {"notify(player, \"WAVED\");"});
        as: wizard
      - command: "wave"
        expect:
          output: "WAVED"
    cleanup:
      - run: 'delete_verb(player, "wave");'
        as: wizard

  - name: dobj_resolution_to_object
    description: dobj string resolves to actual object
    steps:
      - run: |
          obj = create($nothing);
          obj.name = "ball";
          move(obj, player);
          add_verb(player, {player, "xd", "grab"}, {"any", "none", "none"});
          set_verb_code(player, "grab", {"notify(player, \"DOBJ:\" + toliteral(dobj));"});
          return obj;
        capture: ball
        as: wizard
      - command: "grab ball"
        expect:
          output:
            match: "DOBJ:#\\d+"
    cleanup:
      - run: 'delete_verb(player, "grab");'
        as: wizard
      - run: "recycle({ball})"
        as: wizard

  # ============================================
  # Object Matching Semantics
  # ============================================

  - name: me_resolves_to_player
    description: The special object name "me" resolves to the current player
    steps:
      - run: |
          add_verb(player, {player, "xd", "inspect"}, {"any", "none", "none"});
          set_verb_code(player, "inspect", {"notify(player, \"ISME:\" + tostr(dobj == player));"});
          return 1;
        as: wizard
      - command: "inspect me"
        expect:
          output: "ISME:1"
    cleanup:
      - run: 'delete_verb(player, "inspect");'
        as: wizard

  - name: here_resolves_to_player_location
    description: The special object name "here" resolves to the player's location
    steps:
      - run: |
          add_verb(player, {player, "xd", "inspect"}, {"any", "none", "none"});
          set_verb_code(player, "inspect", {"notify(player, \"ISHERE:\" + tostr(dobj == player.location));"});
          return 1;
        as: wizard
      - command: "inspect here"
        expect:
          output: "ISHERE:1"
    cleanup:
      - run: 'delete_verb(player, "inspect");'
        as: wizard

  - name: exact_match_preferred_over_partial_match
    description: Exact object name matches win over partial matches
    steps:
      - run: |
          exact = create($nothing);
          exact.name = "ball";
          move(exact, player);
          partial = create($nothing);
          partial.name = "balloon";
          move(partial, player);
          add_verb(player, {player, "xd", "grab"}, {"any", "none", "none"});
          set_verb_code(player, "grab", {"notify(player, \"NAME:\" + dobj.name);"});
          return {exact, partial};
        capture: objs
        as: wizard
      - command: "grab ball"
        expect:
          output: "NAME:ball"
    cleanup:
      - run: 'delete_verb(player, "grab");'
        as: wizard
      - run: "recycle({objs}[1]);"
        as: wizard
      - run: "recycle({objs}[2]);"
        as: wizard

  - name: unique_partial_match_resolves_to_object
    description: A unique partial object name resolves successfully
    steps:
      - run: |
          obj = create($nothing);
          obj.name = "lantern";
          move(obj, player);
          add_verb(player, {player, "xd", "grab"}, {"any", "none", "none"});
          set_verb_code(player, "grab", {"notify(player, \"NAME:\" + dobj.name);"});
          return obj;
        capture: lantern
        as: wizard
      - command: "grab lan"
        expect:
          output: "NAME:lantern"
    cleanup:
      - run: 'delete_verb(player, "grab");'
        as: wizard
      - run: "recycle({lantern})"
        as: wizard

  - name: ambiguous_partial_match_is_minus_2
    description: Ambiguous partial object names resolve to #-2
    steps:
      - run: |
          first = create($nothing);
          first.name = "book";
          move(first, player);
          second = create($nothing);
          second.name = "box";
          move(second, player);
          add_verb(player, {player, "xd", "grab"}, {"any", "none", "none"});
          set_verb_code(player, "grab", {"notify(player, \"DOBJ:\" + toliteral(dobj));"});
          return {first, second};
        capture: objs
        as: wizard
      - command: "grab bo"
        expect:
          output: "DOBJ:#-2"
    cleanup:
      - run: 'delete_verb(player, "grab");'
        as: wizard
      - run: "recycle({objs}[1]);"
        as: wizard
      - run: "recycle({objs}[2]);"
        as: wizard

  - name: duplicate_exact_matches_are_ambiguous
    description: Matching exact names in inventory and room produce #-2
    steps:
      - run: |
          inv = create($nothing);
          inv.name = "coin";
          move(inv, player);
          room = create($nothing);
          room.name = "coin";
          move(room, player.location);
          add_verb(player, {player, "xd", "grab"}, {"any", "none", "none"});
          set_verb_code(player, "grab", {"notify(player, \"DOBJ:\" + toliteral(dobj));"});
          return {inv, room};
        capture: objs
        as: wizard
      - command: "grab coin"
        expect:
          output: "DOBJ:#-2"
    cleanup:
      - run: 'delete_verb(player, "grab");'
        as: wizard
      - run: "recycle({objs}[1]);"
        as: wizard
      - run: "recycle({objs}[2]);"
        as: wizard

  - name: invalid_numeric_object_reference_is_failed_match
    description: Invalid #object references resolve to FAILED_MATCH
    steps:
      - run: |
          add_verb(player, {player, "xd", "grab"}, {"any", "none", "none"});
          set_verb_code(player, "grab", {"notify(player, \"DOBJ:\" + toliteral(dobj));"});
          return 1;
        as: wizard
      - command: "grab #999999"
        expect:
          output: "DOBJ:#-3"
    cleanup:
      - run: 'delete_verb(player, "grab");'
        as: wizard

  - name: numeric_object_reference_bypasses_visibility
    description: Valid #object references resolve even when the object is not in inventory or room
    steps:
      - run: |
          hidden = create($nothing);
          hidden.name = "hidden";
          add_verb(player, {player, "xd", "grab"}, {"any", "none", "none"});
          set_verb_code(player, "grab", {"notify(player, \"NAME:\" + dobj.name);"});
          return hidden;
        capture: hidden
        as: wizard
      - command: "grab {hidden}"
        expect:
          output: "NAME:hidden"
    cleanup:
      - run: 'delete_verb(player, "grab");'
        as: wizard
      - run: "recycle({hidden})"
        as: wizard

  - name: nested_contents_are_not_matched
    description: Objects inside other objects are not considered during direct matching
    steps:
      - run: |
          container = create($nothing);
          container.name = "box";
          move(container, player);
          hidden = create($nothing);
          hidden.name = "gem";
          move(hidden, container);
          add_verb(player, {player, "xd", "grab"}, {"any", "none", "none"});
          set_verb_code(player, "grab", {"notify(player, \"DOBJ:\" + toliteral(dobj));"});
          return {container, hidden};
        capture: objs
        as: wizard
      - command: "grab gem"
        expect:
          output: "DOBJ:#-3"
    cleanup:
      - run: 'delete_verb(player, "grab");'
        as: wizard
      - run: "recycle({objs}[2]);"
        as: wizard
      - run: "recycle({objs}[1]);"
        as: wizard

  - name: quoted_multiword_name_matches_single_object
    description: Quoted object names are preserved for matching
    steps:
      - run: |
          obj = create($nothing);
          obj.name = "red ball";
          move(obj, player);
          add_verb(player, {player, "xd", "grab"}, {"any", "none", "none"});
          set_verb_code(player, "grab", {"notify(player, \"NAME:\" + dobj.name);"});
          return obj;
        capture: ball
        as: wizard
      - command: 'grab "red ball"'
        expect:
          output: "NAME:red ball"
    cleanup:
      - run: 'delete_verb(player, "grab");'
        as: wizard
      - run: "recycle({ball})"
        as: wizard

  - name: ambiguous_iobj_match_is_minus_2
    description: Ambiguous indirect object names resolve to #-2
    steps:
      - run: |
          ball = create($nothing);
          ball.name = "ball";
          move(ball, player);
          box = create($nothing);
          box.name = "book";
          move(box, player);
          book = create($nothing);
          book.name = "box";
          move(book, player);
          add_verb(player, {player, "xd", "put"}, {"any", "in", "any"});
          set_verb_code(player, "put", {"notify(player, \"IOBJ:\" + toliteral(iobj));"});
          return {ball, box, book};
        capture: objs
        as: wizard
      - command: "put ball in bo"
        expect:
          output: "IOBJ:#-2"
    cleanup:
      - run: 'delete_verb(player, "put");'
        as: wizard
      - run: "recycle({objs}[1]);"
        as: wizard
      - run: "recycle({objs}[2]);"
        as: wizard
      - run: "recycle({objs}[3]);"
        as: wizard

  # ============================================
  # Verb Dispatch Order Tests
  # ============================================
  # ToastStunt searches for verbs in this order:
  # 1. player
  # 2. player.location
  # 3. dobj
  # 4. iobj
  # It does not continue into dobj.location or iobj.location.

  - name: dispatch_player_before_dobj
    description: Verb on player is found before verb on dobj
    steps:
      - run: |
          obj = create($nothing);
          obj.name = "ball";
          move(obj, player);
          add_verb(player, {player, "xd", "kick"}, {"any", "none", "none"});
          set_verb_code(player, "kick", {"notify(player, \"PLAYER\");"});
          add_verb(obj, {player, "xd", "kick"}, {"this", "none", "none"});
          set_verb_code(obj, "kick", {"notify(player, \"DOBJ\");"});
          return obj;
        capture: ball
        as: wizard
      - command: "kick ball"
        expect:
          output: "PLAYER"
    cleanup:
      - run: 'delete_verb(player, "kick");'
        as: wizard
      - run: "recycle({ball})"
        as: wizard

  - name: dispatch_dobj_when_no_player_verb
    description: Verb on dobj is found when player has no matching verb
    steps:
      - run: |
          obj = create($nothing);
          obj.name = "ball";
          move(obj, player);
          add_verb(obj, {player, "xd", "bounce"}, {"this", "none", "none"});
          set_verb_code(obj, "bounce", {"notify(player, \"DOBJ\");"});
          return obj;
        capture: ball
        as: wizard
      - command: "bounce ball"
        expect:
          output: "DOBJ"
    cleanup:
      - run: "recycle({ball})"
        as: wizard

  - name: dispatch_iobj_verb
    description: Verb on iobj is found for two-object command
    steps:
      - run: |
          box = create($nothing);
          box.name = "box";
          move(box, player);
          add_verb(box, {player, "xd", "drop"}, {"any", "in", "this"});
          set_verb_code(box, "drop", {"notify(player, \"IOBJ\");"});
          return box;
        capture: box
        as: wizard
      - run: |
          ball = create($nothing);
          ball.name = "ball";
          move(ball, player);
          return ball;
        capture: ball
        as: wizard
      - command: "drop ball in box"
        expect:
          output: "IOBJ"
    cleanup:
      - run: "recycle({box})"
        as: wizard
      - run: "recycle({ball})"
        as: wizard

  - name: dispatch_location_verb
    description: Verb on player location is found
    steps:
      - run: |
          room = player.location;
          add_verb(room, {player, "xd", "shout"}, {"none", "none", "none"});
          set_verb_code(room, "shout", {"notify(player, \"LOCATION\");"});
          return room;
        capture: room
        as: wizard
      - command: "shout"
        expect:
          output: "LOCATION"
    cleanup:
      - run: 'delete_verb({room}, "shout");'
        as: wizard

  - name: dispatch_player_before_location
    description: Verb on player is found before verb on location
    steps:
      - run: |
          room = player.location;
          add_verb(player, {player, "xd", "yell"}, {"none", "none", "none"});
          set_verb_code(player, "yell", {"notify(player, \"PLAYER\");"});
          add_verb(room, {player, "xd", "yell"}, {"none", "none", "none"});
          set_verb_code(room, "yell", {"notify(player, \"LOCATION\");"});
          return room;
        capture: room
        as: wizard
      - command: "yell"
        expect:
          output: "PLAYER"
    cleanup:
      - run: 'delete_verb(player, "yell");'
        as: wizard
      - run: 'delete_verb({room}, "yell");'
        as: wizard

  - name: dispatch_dobj_location_is_not_searched
    description: dobj.location is not searched by ToastStunt's command parser
    steps:
      - run: |
          room = player.location;

          box = create($nothing);
          box.name = "box";
          move(box, room);

          ball = create($nothing);
          ball.name = "ball";
          move(ball, box);

          add_verb(box, {player, "xd", "poke"}, {"any", "none", "none"});
          set_verb_code(box, "poke", {"notify(player, \"DOBJ_LOCATION\");"});
          return {box, ball};
        capture: objs
        as: wizard
      - command: "poke ball"
        expect:
          output:
            contains: "couldn't understand"
    cleanup:
      - run: 'delete_verb({objs}[1], "poke");'
        as: wizard
      - run: "recycle({objs}[2]);"
        as: wizard
      - run: "recycle({objs}[1]);"
        as: wizard

  - name: dispatch_iobj_location_is_not_searched
    description: iobj.location is not searched by ToastStunt's command parser
    steps:
      - run: |
          room = player.location;

          ball = create($nothing);
          ball.name = "ball";
          move(ball, player);

          crate = create($nothing);
          crate.name = "crate";
          move(crate, room);

          bucket = create($nothing);
          bucket.name = "bucket";
          move(bucket, crate);

          add_verb(crate, {player, "xd", "place"}, {"any", "in", "any"});
          set_verb_code(crate, "place", {"notify(player, \"IOBJ_LOCATION\");"});
          return {ball, crate, bucket};
        capture: objs
        as: wizard
      - command: "place ball in bucket"
        expect:
          output:
            contains: "couldn't understand"
    cleanup:
      - run: 'delete_verb({objs}[2], "place");'
        as: wizard
      - run: "recycle({objs}[3]);"
        as: wizard
      - run: "recycle({objs}[2]);"
        as: wizard
      - run: "recycle({objs}[1]);"
        as: wizard

  - name: preposition_whitespace_and_quoting_match
    description: Extra whitespace and quoted multiword objects still parse correctly
    steps:
      - run: |
          box = create($nothing);
          box.name = "box";
          move(box, player);

          ball = create($nothing);
          ball.name = "red ball";
          move(ball, player);

          add_verb(box, {player, "xd", "put"}, {"any", "in", "this"});
          set_verb_code(box, "put", {
            "notify(player, \"DOBJSTR:\" + dobjstr);",
            "notify(player, \"PREPSTR:\" + prepstr);",
            "notify(player, \"IOBJSTR:\" + iobjstr);"
          });
          return {box, ball};
        capture: objs
        as: wizard
      - command: '   put   "red ball"    in    box   '
        expect:
          output:
            - "DOBJSTR:red ball"
            - "PREPSTR:in"
            - "IOBJSTR:box"
    cleanup:
      - run: 'delete_verb({objs}[1], "put");'
        as: wizard
      - run: "recycle({objs}[2]);"
        as: wizard
      - run: "recycle({objs}[1]);"
        as: wizard

  - name: do_command_sees_normalized_wordlist_before_parsing
    description: do_command receives the normalized command word list and false allows parsing to continue
    steps:
      - run: |
          try
            add_property(#0, "cmdlog", {}, {#0, "w"});
          except (E_INVARG)
          endtry
          try
            add_verb(#0, {#0, "rxd", "do_command"}, {"this", "none", "this"});
          except (E_INVARG)
          endtry
          set_verb_code(#0, "do_command", {
            "if (args[1] != \";\")",
            "  #0.cmdlog = args;",
            "endif",
            "return 0;"
          });

          box = create($nothing);
          box.name = "box";
          move(box, player);

          ball = create($nothing);
          ball.name = "red ball";
          move(ball, player);

          add_verb(box, {player, "xd", "put"}, {"any", "in", "this"});
          set_verb_code(box, "put", {
            "notify(player, \"DOBJSTR:\" + dobjstr);",
            "notify(player, \"PREPSTR:\" + prepstr);",
            "notify(player, \"IOBJSTR:\" + iobjstr);"
          });
          return {box, ball};
        capture: objs
        as: wizard
      - command: '   put   "red ball"    in    box   '
        expect:
          output:
            - "DOBJSTR:red ball"
            - "PREPSTR:in"
            - "IOBJSTR:box"
      - run: "return #0.cmdlog;"
        as: wizard
        expect:
          value: ["put", "red ball", "in", "box"]
    cleanup:
      - run: |
          try
            delete_verb(#0, "do_command");
          except (ANY)
          endtry
        as: wizard
      - run: |
          try
            delete_property(#0, "cmdlog");
          except (ANY)
          endtry
        as: wizard
      - run: 'delete_verb({objs}[1], "put");'
        as: wizard
      - run: "recycle({objs}[2]);"
        as: wizard
      - run: "recycle({objs}[1]);"
        as: wizard

  # ============================================
  # Verb Alias Tests
  # ============================================
  # Verb names can include * for partial matching
  # e.g., "look l*" matches "l", "lo", "loo", "look"

  - name: verb_alias_full_match
    description: Full verb name matches exactly
    steps:
      - run: |
          add_verb(player, {player, "xd", "examine ex*"}, {"none", "none", "none"});
          set_verb_code(player, "examine", {"notify(player, \"EXAMINE\");"});
          return 1;
        as: wizard
      - command: "examine"
        expect:
          output: "EXAMINE"
    cleanup:
      - run: 'delete_verb(player, "examine");'
        as: wizard

  - name: verb_alias_short_match
    description: Shortened verb name matches with * alias
    steps:
      - run: |
          add_verb(player, {player, "xd", "examine ex*"}, {"none", "none", "none"});
          set_verb_code(player, "examine", {"notify(player, \"EXAMINE\");"});
          return 1;
        as: wizard
      - command: "ex"
        expect:
          output: "EXAMINE"
    cleanup:
      - run: 'delete_verb(player, "examine");'
        as: wizard

  - name: verb_alias_partial_match
    description: Partial verb name matches with * alias
    steps:
      - run: |
          add_verb(player, {player, "xd", "look l*"}, {"none", "none", "none"});
          set_verb_code(player, "look", {"notify(player, \"LOOK\");"});
          return 1;
        as: wizard
      - command: "loo"
        expect:
          output: "LOOK"
    cleanup:
      - run: 'delete_verb(player, "look");'
        as: wizard

  - name: verb_alias_single_letter
    description: Single letter matches with * alias
    steps:
      - run: |
          add_verb(player, {player, "xd", "inventory i*"}, {"none", "none", "none"});
          set_verb_code(player, "inventory", {"notify(player, \"INVENTORY\");"});
          return 1;
        as: wizard
      - command: "i"
        expect:
          output: "INVENTORY"
    cleanup:
      - run: 'delete_verb(player, "inventory");'
        as: wizard

  - name: verb_multiple_aliases
    description: Verb with multiple aliases works
    steps:
      - run: |
          add_verb(player, {player, "xd", "quit @quit"}, {"none", "none", "none"});
          set_verb_code(player, "quit", {"notify(player, \"QUIT\");"});
          return 1;
        as: wizard
      - command: "@quit"
        expect:
          output: "QUIT"
    cleanup:
      - run: 'delete_verb(player, "quit");'
        as: wizard

  # ============================================
  # huh Verb Fallback Tests
  # ============================================
  # When no matching verb is found, player.location:huh is called

  - name: huh_verb_called_on_no_match
    description: huh verb is called when command does not match any verb
    steps:
      - run: |
          room = player.location;
          add_verb(room, {player, "xd", "huh"}, {"none", "none", "none"});
          set_verb_code(room, "huh", {"notify(player, \"HUH:\" + verb);"});
          return room;
        capture: room
        as: wizard
      - command: "xyzzy"
        expect:
          output: "HUH:xyzzy"
    cleanup:
      - run: 'delete_verb({room}, "huh");'
        as: wizard

  - name: huh_receives_parsed_command
    description: huh verb receives the attempted command info
    steps:
      - run: |
          room = player.location;
          add_verb(room, {player, "xd", "huh"}, {"none", "none", "none"});
          set_verb_code(room, "huh", {"notify(player, \"ARGSTR:\" + argstr);"});
          return room;
        capture: room
        as: wizard
      - command: "frobnicate the widget"
        expect:
          output: "ARGSTR:the widget"
    cleanup:
      - run: 'delete_verb({room}, "huh");'
        as: wizard

  # ============================================
  # Say/Emote Shortcut Tests
  # ============================================
  # " prefix → say command
  # : prefix → emote command

  - name: say_shortcut_quote
    description: '"hello expands to say hello'
    steps:
      - run: |
          add_verb(player, {player, "xd", "say"}, {"any", "none", "none"});
          set_verb_code(player, "say", {"notify(player, \"SAY:\" + argstr);"});
          return 1;
        as: wizard
      - command: '"hello world'
        expect:
          output: "SAY:hello world"
    cleanup:
      - run: 'delete_verb(player, "say");'
        as: wizard

  - name: emote_shortcut_colon
    description: ':waves expands to emote waves'
    steps:
      - run: |
          add_verb(player, {player, "xd", "emote"}, {"any", "none", "none"});
          set_verb_code(player, "emote", {"notify(player, \"EMOTE:\" + argstr);"});
          return 1;
        as: wizard
      - command: ":waves"
        expect:
          output: "EMOTE:waves"
    cleanup:
      - run: 'delete_verb(player, "emote");'
        as: wizard

  - name: emote_with_spaces
    description: ':waves happily expands correctly'
    steps:
      - run: |
          add_verb(player, {player, "xd", "emote"}, {"any", "none", "none"});
          set_verb_code(player, "emote", {"notify(player, \"EMOTE:\" + argstr);"});
          return 1;
        as: wizard
      - command: ":waves happily"
        expect:
          output: "EMOTE:waves happily"
    cleanup:
      - run: 'delete_verb(player, "emote");'
        as: wizard
