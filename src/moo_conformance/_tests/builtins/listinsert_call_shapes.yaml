name: listinsert_call_shapes
description: Table-driven TYPE_ANY coverage for listinsert().

requires:
  builtins:
    - listinsert

tests:
  - name: listinsert_value_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [int, "1"]
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [map, "[1 -> 2]"]
    code: "listinsert({}, {expr})"
    expect:
      type: list

  - name: listinsert_value_{kind}_with_index
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: "listinsert({}, {expr}, 1)"
    expect:
      type: list
