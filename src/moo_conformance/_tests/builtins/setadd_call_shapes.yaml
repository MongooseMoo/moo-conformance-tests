name: setadd_call_shapes
description: Table-driven TYPE_ANY coverage for setadd().

requires:
  builtins:
    - setadd

tests:
  - name: setadd_value_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [int, "1"]
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: "setadd({}, {expr})"
    expect:
      type: list
