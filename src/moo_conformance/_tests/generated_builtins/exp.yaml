name: generated_builtin_signature_exp
description: Generated conformance tests for exp() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - exp
tests:
- name: exp_function_info_signature_matches_source
  permission: wizard
  code: function_info("exp")
  expect:
    value:
    - exp
    - 1
    - 1
    - - 9
- name: exp_too_few_args
  permission: wizard
  code: exp()
  expect:
    error: E_ARGS
- name: exp_too_many_args
  permission: wizard
  code: exp(1.5, 1)
  expect:
    error: E_ARGS
- name: exp_arg_1_rejects_wrong_type
  permission: wizard
  code: exp("x")
  expect:
    error: E_TYPE
