name: generated_builtin_signature_min
description: Generated conformance tests for min() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - min
tests:
- name: min_function_info_signature_matches_source
  permission: wizard
  code: function_info("min")
  expect:
    value:
    - min
    - 1
    - -1
    - - -2
- name: min_too_few_args
  permission: wizard
  code: min()
  expect:
    error: E_ARGS
- name: min_arg_1_rejects_wrong_type
  permission: wizard
  code: min("x")
  expect:
    error: E_TYPE
