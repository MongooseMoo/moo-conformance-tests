name: audit_command_parser_toast_oracle
description: ToastStunt oracle tests for command parsing and object matching deviations found in Barn.

tests:
  - name: audit_tokenizer_backslash_escapes
    description: Backslash escapes protect the following character inside command words.
    steps:
      - run: |
          add_verb(player, {player, "xd", "audit_words"}, {"any", "none", "none"});
          set_verb_code(player, "audit_words", {
            "notify(player, \"LEN:\" + tostr(length(args)));",
            "notify(player, \"ARG1:\" + args[1]);",
            "notify(player, \"ARG2:\" + args[2]);"
          });
          return 1;
        as: wizard
      - command: 'audit_words foo\ bar baz'
        expect:
          output:
            - "LEN:2"
            - "ARG1:foo bar"
            - "ARG2:baz"
    cleanup:
      - run: 'delete_verb(player, "audit_words");'
        as: wizard

  - name: audit_tokenizer_midword_quotes
    description: Quotes toggle inside a word and can include spaces in that same word.
    steps:
      - run: |
          add_verb(player, {player, "xd", "audit_words"}, {"any", "none", "none"});
          set_verb_code(player, "audit_words", {
            "notify(player, \"LEN:\" + tostr(length(args)));",
            "notify(player, \"ARG1:\" + args[1]);",
            "notify(player, \"ARG2:\" + args[2]);"
          });
          return 1;
        as: wizard
      - command: 'audit_words ab"c d"ef zz'
        expect:
          output:
            - "LEN:2"
            - "ARG1:abc def"
            - "ARG2:zz"
    cleanup:
      - run: 'delete_verb(player, "audit_words");'
        as: wizard

  - name: audit_argstr_preserves_internal_spacing
    description: argstr preserves original spacing after the verb's separating spaces are skipped.
    steps:
      - run: |
          add_verb(player, {player, "xd", "audit_arg"}, {"any", "none", "none"});
          set_verb_code(player, "audit_arg", {
            "notify(player, \"ARGSTR:[\" + argstr + \"]\");"
          });
          return 1;
        as: wizard
      - command: 'audit_arg    alpha   beta'
        expect:
          output: "ARGSTR:[alpha   beta]"
    cleanup:
      - run: 'delete_verb(player, "audit_arg");'
        as: wizard

  - name: audit_preposition_scan_uses_leftmost_position
    description: Toast chooses the earliest preposition occurrence in the command, not the longest later phrase.
    steps:
      - run: |
          add_verb(player, {player, "xd", "auditprep"}, {"any", "any", "any"});
          set_verb_code(player, "auditprep", {
            "notify(player, \"DOBJSTR:\" + dobjstr);",
            "notify(player, \"PREPSTR:\" + prepstr);",
            "notify(player, \"IOBJSTR:\" + iobjstr);"
          });
          return 1;
        as: wizard
      - command: "auditprep book out of bag in front of chair"
        expect:
          output:
            - "DOBJSTR:book"
            - "PREPSTR:out of"
            - "IOBJSTR:bag in front of chair"
    cleanup:
      - run: 'delete_verb(player, "auditprep");'
        as: wizard

  - name: audit_negative_object_literals_are_failed_match
    description: Negative object literals in command object slots are FAILED_MATCH, not the literal negative object.
    steps:
      - run: |
          add_verb(player, {player, "xd", "auditgrab"}, {"any", "none", "none"});
          set_verb_code(player, "auditgrab", {
            "notify(player, \"DOBJ:\" + toliteral(dobj));"
          });
          return 1;
        as: wizard
      - command: "auditgrab #-1"
        expect:
          output: "DOBJ:#-3"
      - command: "auditgrab #-2"
        expect:
          output: "DOBJ:#-3"
      - command: "auditgrab #-3"
        expect:
          output: "DOBJ:#-3"
    cleanup:
      - run: 'delete_verb(player, "auditgrab");'
        as: wizard

  - name: audit_name_alias_exact_match_is_ambiguous
    description: Exact object-name and alias matches share one ambiguity pool.
    steps:
      - run: |
          first = create($nothing);
          first.name = "auditexact";
          add_property(first, "aliases", {}, {player, "rw"});
          move(first, player);
          second = create($nothing);
          second.name = "other audit exact";
          add_property(second, "aliases", {"auditexact"}, {player, "rw"});
          move(second, player);
          add_verb(player, {player, "xd", "auditlook"}, {"any", "none", "none"});
          set_verb_code(player, "auditlook", {
            "notify(player, \"DOBJ:\" + toliteral(dobj));"
          });
          return {first, second};
        capture: objs
        as: wizard
      - command: "auditlook auditexact"
        expect:
          output: "DOBJ:#-2"
    cleanup:
      - run: 'delete_verb(player, "auditlook");'
        as: wizard
      - run: "recycle({objs}[1]); recycle({objs}[2]);"
        as: wizard

  - name: audit_name_alias_partial_match_is_ambiguous
    description: Partial object-name and alias matches share one ambiguity pool.
    steps:
      - run: |
          first = create($nothing);
          first.name = "auditpartialone";
          add_property(first, "aliases", {}, {player, "rw"});
          move(first, player);
          second = create($nothing);
          second.name = "other audit partial";
          add_property(second, "aliases", {"auditpartialtwo"}, {player, "rw"});
          move(second, player);
          add_verb(player, {player, "xd", "auditlook"}, {"any", "none", "none"});
          set_verb_code(player, "auditlook", {
            "notify(player, \"DOBJ:\" + toliteral(dobj));"
          });
          return {first, second};
        capture: objs
        as: wizard
      - command: "auditlook auditpartial"
        expect:
          output: "DOBJ:#-2"
    cleanup:
      - run: 'delete_verb(player, "auditlook");'
        as: wizard
      - run: "recycle({objs}[1]); recycle({objs}[2]);"
        as: wizard

  - name: audit_player_name_matches_room_contents
    description: The current player is still considered when matching room contents by name.
    steps:
      - run: |
          old_name = player.name;
          player.name = "auditplayerunique";
          add_property(player, "audit_old_name", old_name, {player, "rw"});
          add_verb(player, {player, "xd", "auditlook"}, {"any", "none", "none"});
          set_verb_code(player, "auditlook", {
            "notify(player, \"ISPLAYER:\" + tostr(dobj == player));"
          });
          return 1;
        as: wizard
      - command: "auditlook auditplayerunique"
        expect:
          output: "ISPLAYER:1"
    cleanup:
      - run: |
          player.name = player.audit_old_name;
          delete_property(player, "audit_old_name");
          delete_verb(player, "auditlook");
        as: wizard

  - name: audit_do_command_runs_before_semicolon_eval
    description: do_command is invoked even for a semicolon eval command.
    steps:
      - run: |
          try
            add_property(#0, "audit_do_command_seen", "", {#0, "rw"});
          except (E_INVARG)
          endtry
          try
            add_verb(#0, {#0, "rxd", "do_command"}, {"this", "none", "this"});
          except (E_INVARG)
          endtry
          set_verb_code(#0, "do_command", {
            "#0.audit_do_command_seen = args[1];",
            "return 0;"
          });
          return 1;
        as: wizard
      - command: ";return 12345;"
      - run: "return #0.audit_do_command_seen;"
        as: wizard
        expect:
          value: ";"
    cleanup:
      - run: |
          try
            delete_verb(#0, "do_command");
          except (ANY)
          endtry
          try
            delete_property(#0, "audit_do_command_seen");
          except (ANY)
          endtry
        as: wizard

  - name: audit_huh_runs_after_argspec_mismatch
    description: A matching verb name with mismatching argspec falls through to huh.
    steps:
      - run: |
          room = player.location;
          add_verb(player, {player, "xd", "auditmismatch"}, {"none", "none", "none"});
          set_verb_code(player, "auditmismatch", {"notify(player, \"BAD_MATCH\");"});
          add_verb(room, {player, "xd", "huh"}, {"none", "none", "none"});
          set_verb_code(room, "huh", {
            "notify(player, \"HUH:\" + verb);",
            "notify(player, \"ARGSTR:\" + argstr);"
          });
          return room;
        capture: room
        as: wizard
      - command: "auditmismatch object"
        expect:
          output:
            - "HUH:auditmismatch"
            - "ARGSTR:object"
    cleanup:
      - run: 'delete_verb(player, "auditmismatch"); delete_verb({room}, "huh");'
        as: wizard

  - name: audit_say_shortcut_reparses_preposition
    description: Leading quote rewrites to say and then receives normal preposition parsing.
    steps:
      - run: |
          box = create($nothing);
          box.name = "auditbox";
          move(box, player);
          add_verb(player, {player, "xd", "say"}, {"any", "in", "any"});
          set_verb_code(player, "say", {
            "notify(player, \"DOBJSTR:\" + dobjstr);",
            "notify(player, \"PREPSTR:\" + prepstr);",
            "notify(player, \"IOBJSTR:\" + iobjstr);"
          });
          return box;
        capture: box
        as: wizard
      - command: '"widget in auditbox'
        expect:
          output:
            - "DOBJSTR:widget"
            - "PREPSTR:in"
            - "IOBJSTR:auditbox"
    cleanup:
      - run: 'delete_verb(player, "say"); recycle({box});'
        as: wizard

  - name: audit_emote_shortcut_reparses_preposition
    description: Leading colon rewrites to emote and then receives normal preposition parsing.
    steps:
      - run: |
          add_verb(player, {player, "xd", "emote"}, {"any", "at", "any"});
          set_verb_code(player, "emote", {
            "notify(player, \"DOBJSTR:\" + dobjstr);",
            "notify(player, \"PREPSTR:\" + prepstr);",
            "notify(player, \"IOBJSTR:\" + iobjstr);",
            "notify(player, \"IOBJISPLAYER:\" + tostr(iobj == player));"
          });
          return 1;
        as: wizard
      - command: ":wave at me"
        expect:
          output:
            - "DOBJSTR:wave"
            - "PREPSTR:at"
            - "IOBJSTR:me"
            - "IOBJISPLAYER:1"
    cleanup:
      - run: 'delete_verb(player, "emote");'
        as: wizard

  - name: audit_eval_shortcut_reparses_preposition
    description: Leading semicolon rewrites to eval and then receives normal command parsing before dispatch.
    steps:
      - run: |
          box = create($nothing);
          box.name = "auditevalbox";
          move(box, player);
          add_verb(player, {player, "xd", "eval"}, {"any", "in", "any"});
          set_verb_code(player, "eval", {
            "notify(player, \"DOBJSTR:\" + dobjstr);",
            "notify(player, \"PREPSTR:\" + prepstr);",
            "notify(player, \"IOBJSTR:\" + iobjstr);"
          });
          return box;
        capture: box
        as: wizard
      - command: ";widget in auditevalbox"
        expect:
          output:
            - "DOBJSTR:widget"
            - "PREPSTR:in"
            - "IOBJSTR:auditevalbox"
    cleanup:
      - run: 'delete_verb(player, "eval"); recycle({box});'
        as: wizard

  - name: audit_do_command_receives_quoted_backslash_wordlist
    description: do_command receives Toast's parse_into_wordlist result for escaped and mid-word quoted input.
    steps:
      - run: |
          try
            add_property(#0, "audit_do_command_words", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          try
            add_verb(#0, {#0, "rxd", "do_command"}, {"this", "none", "this"});
          except (E_INVARG)
          endtry
          set_verb_code(#0, "do_command", {
            "if (args[1] == \";\")",
            "  return 0;",
            "endif",
            "#0.audit_do_command_words = args;",
            "return 1;"
          });
          return 1;
        as: wizard
      - command: 'auditnoop foo\ bar ab"c d"ef'
      - run: "return #0.audit_do_command_words;"
        as: wizard
        expect:
          value:
            - "auditnoop"
            - "foo bar"
            - "abc def"
    cleanup:
      - run: |
          try
            delete_verb(#0, "do_command");
          except (ANY)
          endtry
          try
            delete_property(#0, "audit_do_command_words");
          except (ANY)
          endtry
        as: wizard

  - name: audit_dot_program_intrinsic_installs_verb_code
    description: The .program intrinsic enters programming mode and installs submitted verb code.
    permission: wizard
    steps:
      - run: |
          obj = create($nothing);
          obj.name = "audit program target";
          add_verb(obj, {player, "rxd", "auditprog"}, {"this", "none", "none"});
          return obj;
        capture: obj
        as: wizard
      - command: ".program {obj}:auditprog"
      - command: "return 4242;"
      - command: "."
      - run: "return {obj}:auditprog();"
        as: wizard
        expect:
          value: 4242
    cleanup:
      - run: "recycle({obj});"
        as: wizard

  - name: audit_inherited_command_caller_is_player
    description: A player-entered command inherited from an ancestor sees caller equal to player, not the defining ancestor.
    steps:
      - run: 'return parent(player);'
        capture: old_parent
        as: wizard
      - run: 'return create({old_parent});'
        capture: ancestor
        as: wizard
      - run: |
          add_verb({ancestor}, {player, "xd", "audit_inherited_caller"}, {"any", "any", "any"});
          set_verb_code({ancestor}, "audit_inherited_caller", {"notify(player, \"CALLER_IS_PLAYER:\" + tostr(caller == player));"});
          chparent(player, {ancestor});
          return 1;
        as: wizard
      - command: audit_inherited_caller
        expect:
          output: "CALLER_IS_PLAYER:1"
    cleanup:
      - run: 'chparent(player, {old_parent}); recycle({ancestor});'
        as: wizard

  - name: audit_deep_inherited_command_caller_is_player
    description: A player-entered command defined above an intervening ancestor still sees caller equal to player.
    steps:
      - run: 'return parent(player);'
        capture: old_parent
        as: wizard
      - run: 'return create({old_parent});'
        capture: defining_ancestor
        as: wizard
      - run: 'return create({defining_ancestor});'
        capture: middle_ancestor
        as: wizard
      - run: |
          add_verb({defining_ancestor}, {player, "xd", "audit_deep_inherited_caller"}, {"any", "any", "any"});
          set_verb_code({defining_ancestor}, "audit_deep_inherited_caller", {"notify(player, \"CALLER_IS_PLAYER:\" + tostr(caller == player));"});
          chparent(player, {middle_ancestor});
          return 1;
        as: wizard
      - command: audit_deep_inherited_caller
        expect:
          output: "CALLER_IS_PLAYER:1"
    cleanup:
      - run: 'chparent(player, {old_parent}); recycle({middle_ancestor}); recycle({defining_ancestor});'
        as: wizard

  - name: audit_inherited_command_pass_preserves_player_caller
    description: An inherited player command and its pass target both preserve caller equal to the player.
    steps:
      - run: 'return parent(player);'
        capture: old_parent
        as: wizard
      - run: 'return create({old_parent});'
        capture: pass_target
        as: wizard
      - run: 'return create({pass_target});'
        capture: pass_gap
        as: wizard
      - run: 'return create({pass_gap});'
        capture: command_definer
        as: wizard
      - run: |
          add_verb({pass_target}, {player, "xd", "audit_pass_caller"}, {"any", "any", "any"});
          set_verb_code({pass_target}, "audit_pass_caller", {"notify(player, \"PASS_CALLER_IS_PLAYER:\" + tostr(caller == player));"});
          add_verb({command_definer}, {player, "xd", "audit_pass_caller"}, {"any", "any", "any"});
          set_verb_code({command_definer}, "audit_pass_caller", {"notify(player, \"COMMAND_CALLER_IS_PLAYER:\" + tostr(caller == player));", "return pass(@args);"});
          chparent(player, {command_definer});
          return 1;
        as: wizard
      - command: audit_pass_caller
        expect:
          output:
            - "COMMAND_CALLER_IS_PLAYER:1"
            - "PASS_CALLER_IS_PLAYER:1"
    cleanup:
      - run: 'chparent(player, {old_parent}); recycle({command_definer}); recycle({pass_gap}); recycle({pass_target});'
        as: wizard
