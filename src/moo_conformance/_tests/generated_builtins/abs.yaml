name: generated_builtin_signature_abs
description: Generated conformance tests for abs() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - abs
tests:
- name: abs_function_info_signature_matches_source
  permission: wizard
  code: function_info("abs")
  expect:
    value:
    - abs
    - 1
    - 1
    - - -2
- name: abs_too_few_args
  permission: wizard
  code: abs()
  expect:
    error: E_ARGS
- name: abs_too_many_args
  permission: wizard
  code: abs(1, 1)
  expect:
    error: E_ARGS
- name: abs_arg_1_rejects_wrong_type
  permission: wizard
  code: abs("x")
  expect:
    error: E_TYPE
