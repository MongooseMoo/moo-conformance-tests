name: set_player_flag_call_shapes
description: Table-driven TYPE_ANY coverage for set_player_flag().

requires:
  builtins:
    - set_player_flag

tests:
  - name: set_player_flag_value_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [int, "1"]
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: "set_player_flag(#999999, {expr})"
    expect:
      error: E_INVARG
