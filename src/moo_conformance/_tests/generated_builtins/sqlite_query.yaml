name: generated_builtin_signature_sqlite_query
description: Generated conformance tests for sqlite_query() builtin signature, derived
  from Toast source.
requires:
  builtins:
  - function_info
  - sqlite_query
tests:
- name: sqlite_query_function_info_signature_matches_source
  permission: wizard
  code: function_info("sqlite_query")
  expect:
    value:
    - sqlite_query
    - 2
    - 3
    - - 0
      - 2
      - -1
- name: sqlite_query_too_few_args
  permission: wizard
  code: sqlite_query()
  expect:
    error: E_ARGS
- name: sqlite_query_too_many_args
  permission: wizard
  code: sqlite_query(1, "x", 1, 1)
  expect:
    error: E_ARGS
- name: sqlite_query_arg_1_rejects_wrong_type
  permission: wizard
  code: sqlite_query("x", "x")
  expect:
    error: E_TYPE
- name: sqlite_query_arg_2_rejects_wrong_type
  permission: wizard
  code: sqlite_query(1, 1)
  expect:
    error: E_TYPE
