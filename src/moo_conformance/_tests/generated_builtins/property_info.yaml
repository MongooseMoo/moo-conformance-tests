name: generated_builtin_signature_property_info
description: Generated conformance tests for property_info() builtin signature, derived
  from Toast source.
requires:
  builtins:
  - function_info
  - property_info
tests:
- name: property_info_function_info_signature_matches_source
  permission: wizard
  code: function_info("property_info")
  expect:
    value:
    - property_info
    - 2
    - 2
    - - -1
      - 2
