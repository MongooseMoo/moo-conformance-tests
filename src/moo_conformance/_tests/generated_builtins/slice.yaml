name: generated_builtin_signature_slice
description: Generated conformance tests for slice() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - slice
tests:
- name: slice_function_info_signature_matches_source
  permission: wizard
  code: function_info("slice")
  expect:
    value:
    - slice
    - 1
    - 3
    - - 4
      - -1
      - -1
- name: slice_too_few_args
  permission: wizard
  code: slice()
  expect:
    error: E_ARGS
- name: slice_too_many_args
  permission: wizard
  code: slice({}, 1, 1, 1)
