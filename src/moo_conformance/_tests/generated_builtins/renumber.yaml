name: generated_builtin_signature_renumber
description: Generated conformance tests for renumber() builtin signature, derived
  from Toast source.
requires:
  builtins:
  - function_info
  - renumber
tests:
- name: renumber_function_info_signature_matches_source
  permission: wizard
  code: function_info("renumber")
  expect:
    value:
    - renumber
    - 1
    - 1
    - - 1
- name: renumber_too_few_args
  permission: wizard
  code: renumber()
  expect:
    error: E_ARGS
- name: renumber_too_many_args
  permission: wizard
  code: renumber(#0, 1)
