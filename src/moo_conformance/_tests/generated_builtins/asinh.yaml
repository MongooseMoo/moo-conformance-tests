name: generated_builtin_signature_asinh
description: Generated conformance tests for asinh() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - asinh
tests:
- name: asinh_function_info_signature_matches_source
  permission: wizard
  code: function_info("asinh")
  expect:
    value:
    - asinh
    - 1
    - 1
    - - 9
- name: asinh_too_few_args
  permission: wizard
  code: asinh()
  expect:
    error: E_ARGS
- name: asinh_too_many_args
  permission: wizard
  code: asinh(1.5, 1)
  expect:
    error: E_ARGS
- name: asinh_arg_1_rejects_wrong_type
  permission: wizard
  code: asinh("x")
  expect:
    error: E_TYPE
