name: startup_repair_broken1
description: Repairs invalid object references from ToastStunt's Broken1 canned DB.
server_db: Broken1.db
requires:
  config:
    - managed_server
    - server_dir
    - log_file
    - server_db_dir
tests:
  - name: invalid_object_references_are_repaired
    steps:
      - wait: 500
      - assert_log:
          contains: "#0.parent = #"
      - assert_log:
          contains: "#0.child = #"
      - assert_log:
          contains: "#0.location = #101 <invalid> ... fixed"
      - assert_log:
          contains: "#0.content = #"
