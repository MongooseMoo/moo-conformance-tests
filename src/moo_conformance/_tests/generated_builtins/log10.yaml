name: generated_builtin_signature_log10
description: Generated conformance tests for log10() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - log10
tests:
- name: log10_function_info_signature_matches_source
  permission: wizard
  code: function_info("log10")
  expect:
    value:
    - log10
    - 1
    - 1
    - - 9
- name: log10_too_few_args
  permission: wizard
  code: log10()
  expect:
    error: E_ARGS
- name: log10_too_many_args
  permission: wizard
  code: log10(1.5, 1)
  expect:
    error: E_ARGS
- name: log10_arg_1_rejects_wrong_type
  permission: wizard
  code: log10("x")
  expect:
    error: E_TYPE
