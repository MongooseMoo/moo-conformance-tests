name: generated_builtin_signature_cosh
description: Generated conformance tests for cosh() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - cosh
tests:
- name: cosh_function_info_signature_matches_source
  permission: wizard
  code: function_info("cosh")
  expect:
    value:
    - cosh
    - 1
    - 1
    - - 9
- name: cosh_too_few_args
  permission: wizard
  code: cosh()
  expect:
    error: E_ARGS
- name: cosh_too_many_args
  permission: wizard
  code: cosh(1.5, 1)
  expect:
    error: E_ARGS
- name: cosh_arg_1_rejects_wrong_type
  permission: wizard
  code: cosh("x")
  expect:
    error: E_TYPE
