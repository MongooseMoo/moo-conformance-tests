name: index_call_shapes
description: Table-driven TYPE_ANY coverage for index().

requires:
  builtins:
    - index

tests:
  - name: index_third_arg_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: 'index("foo", "o", {expr})'
    expect:
      type: int

  - name: index_third_arg_{kind}_with_start
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: 'index("foo", "o", {expr}, 1)'
    expect:
      type: int
