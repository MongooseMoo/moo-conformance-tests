name: generated_builtin_signature_sinh
description: Generated conformance tests for sinh() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - sinh
tests:
- name: sinh_function_info_signature_matches_source
  permission: wizard
  code: function_info("sinh")
  expect:
    value:
    - sinh
    - 1
    - 1
    - - 9
- name: sinh_too_few_args
  permission: wizard
  code: sinh()
  expect:
    error: E_ARGS
- name: sinh_too_many_args
  permission: wizard
  code: sinh(1.5, 1)
  expect:
    error: E_ARGS
- name: sinh_arg_1_rejects_wrong_type
  permission: wizard
  code: sinh("x")
  expect:
    error: E_TYPE
