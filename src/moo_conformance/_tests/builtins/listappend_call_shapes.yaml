name: listappend_call_shapes
description: Table-driven TYPE_ANY coverage for listappend().

requires:
  builtins:
    - listappend

tests:
  - name: listappend_value_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [map, "[1 -> 2]"]
    code: "listappend({}, {expr})"
    expect:
      type: list

  - name: listappend_value_{kind}_with_index
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: "listappend({}, {expr}, 1)"
    expect:
      type: list
