name: generated_builtin_signature_max
description: Generated conformance tests for max() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - max
tests:
- name: max_function_info_signature_matches_source
  permission: wizard
  code: function_info("max")
  expect:
    value:
    - max
    - 1
    - -1
    - - -2
- name: max_too_few_args
  permission: wizard
  code: max()
  expect:
    error: E_ARGS
- name: max_arg_1_rejects_wrong_type
  permission: wizard
  code: max("x")
  expect:
    error: E_TYPE
