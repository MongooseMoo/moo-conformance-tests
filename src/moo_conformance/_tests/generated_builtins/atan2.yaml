name: generated_builtin_signature_atan2
description: Generated conformance tests for atan2() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - atan2
tests:
- name: atan2_function_info_signature_matches_source
  permission: wizard
  code: function_info("atan2")
  expect:
    value:
    - atan2
    - 2
    - 2
    - - 9
      - 9
- name: atan2_too_few_args
  permission: wizard
  code: atan2()
  expect:
    error: E_ARGS
- name: atan2_too_many_args
  permission: wizard
  code: atan2(1.5, 1.5, 1)
