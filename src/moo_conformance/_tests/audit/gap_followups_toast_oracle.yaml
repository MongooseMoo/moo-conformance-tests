  - name: audit_binary_mode_dispatches_raw_chunk_without_newline
    description: Toast binary connection mode dispatches an ASCII byte chunk without waiting for CR or LF.
    steps:
      - run: |
          for prop in ({"audit_binary_player", "audit_binary_seen", "audit_binary_login_saved"})
            try
              add_property(#0, prop, {}, {#0, "rw"});
            except (E_INVARG)
            endtry
          endfor
          login_player = create($nothing);
          set_player_flag(login_player, 1);
          #0.audit_binary_player = login_player;
          #0.audit_binary_seen = {};
          add_verb(login_player, {player, "rxd", "auditbin"}, {"none", "none", "none"});
          set_verb_code(login_player, "auditbin", {
            "#0.audit_binary_seen = listappend(#0.audit_binary_seen, argstr);",
            "return 1;"
          });
          old_login_exists = 1;
          try
            old_login_info = verb_info(#0, "do_login_command");
            old_login_args = verb_args(#0, "do_login_command");
            old_login_code = verb_code(#0, "do_login_command");
          except (E_VERBNF)
            old_login_exists = 0;
            old_login_info = {};
            old_login_args = {};
            old_login_code = {};
          endtry
          #0.audit_binary_login_saved = {old_login_exists, old_login_info, old_login_args, old_login_code};
          try
            add_verb(#0, {#0, "rxd", "do_login_command"}, {"this", "none", "this"});
          except (E_INVARG)
          endtry
          set_verb_info(#0, "do_login_command", {player, "rxd", "do_login_command"});
          set_verb_args(#0, "do_login_command", {"this", "none", "this"});
          set_verb_code(#0, "do_login_command", {"return #0.audit_binary_player;"});
          return 1;
        as: wizard
      - new_connection:
          capture: conn1
      - send:
          connection: conn1
          text: "login-binary-mode"
      - wait: 500
      - run: |
          set_connection_option(#0.audit_binary_player, "binary", 1);
          return 1;
        as: wizard
      - send_bytes:
          connection: conn1
          hex: "617564697462696e"
      - wait: 500
      - run: "return #0.audit_binary_seen;"
        as: wizard
        expect:
          value:
            - ""
      - close_connection: conn1
    cleanup:
      - run: |
          try
            set_connection_option(#0.audit_binary_player, "binary", 0);
          except (ANY)
          endtry
          try
            saved = #0.audit_binary_login_saved;
            if (saved[1])
              set_verb_info(#0, "do_login_command", saved[2]);
              set_verb_args(#0, "do_login_command", saved[3]);
              set_verb_code(#0, "do_login_command", saved[4]);
            else
              delete_verb(#0, "do_login_command");
            endif
          except (ANY)
          endtry
          try
            boot_player(#0.audit_binary_player);
          except (ANY)
          endtry
          try
            recycle(#0.audit_binary_player);
          except (ANY)
          endtry
          for prop in ({"audit_binary_player", "audit_binary_seen", "audit_binary_login_saved"})
            try
              delete_property(#0, prop);
            except (ANY)
            endtry
          endfor
        as: wizard

  - name: audit_output_order_disconnect
    description: Toast delivers already-buffered command output before the built-in disconnect message during boot_player().
    steps:
      - run: |
          for prop in ({"audit_order_player", "audit_order_login_saved"})
            try
              add_property(#0, prop, {}, {#0, "rw"});
            except (E_INVARG)
            endtry
          endfor
          login_player = create($nothing);
          set_player_flag(login_player, 1);
          #0.audit_order_player = login_player;
          add_verb(login_player, {player, "rxd", "auditbye"}, {"none", "none", "none"});
          set_verb_code(login_player, "auditbye", {
            "notify(player, \"audit-before-boot\");",
            "boot_player(player);",
            "return 1;"
          });
          old_login_exists = 1;
          try
            old_login_info = verb_info(#0, "do_login_command");
            old_login_args = verb_args(#0, "do_login_command");
            old_login_code = verb_code(#0, "do_login_command");
          except (E_VERBNF)
            old_login_exists = 0;
            old_login_info = {};
            old_login_args = {};
            old_login_code = {};
          endtry
          #0.audit_order_login_saved = {old_login_exists, old_login_info, old_login_args, old_login_code};
          try
            add_verb(#0, {#0, "rxd", "do_login_command"}, {"this", "none", "this"});
          except (E_INVARG)
          endtry
          set_verb_info(#0, "do_login_command", {player, "rxd", "do_login_command"});
          set_verb_args(#0, "do_login_command", {"this", "none", "this"});
          set_verb_code(#0, "do_login_command", {"return #0.audit_order_player;"});
          return 1;
        as: wizard
      - new_connection:
          capture: conn1
      - send:
          connection: conn1
          text: "login-output-order"
      - wait: 500
      - send:
          connection: conn1
          text: "auditbye"
        expect:
          output:
            exact:
              - audit-before-boot
              - "*** Disconnected ***"
      - wait: 500
      - close_connection: conn1
    cleanup:
      - run: |
          try
            saved = #0.audit_order_login_saved;
            if (saved[1])
              set_verb_info(#0, "do_login_command", saved[2]);
              set_verb_args(#0, "do_login_command", saved[3]);
              set_verb_code(#0, "do_login_command", saved[4]);
            else
              delete_verb(#0, "do_login_command");
            endif
          except (ANY)
          endtry
          try
            boot_player(#0.audit_order_player);
          except (ANY)
          endtry
          try
            recycle(#0.audit_order_player);
          except (ANY)
          endtry
          for prop in ({"audit_order_player", "audit_order_login_saved"})
            try
              delete_property(#0, prop);
            except (ANY)
            endtry
          endfor
        as: wizard

  - name: audit_property_flags_deny_nonowner_read_and_write
    description: Property read/write flags deny non-owner programmers like Toast.
    steps:
      - run: |
          obj = create($nothing);
          obj.w = 0;
          add_property(obj, "audit_secret", 10, {#0, ""});
          return obj;
        capture: obj
        as: wizard
      - run: "return {obj}.audit_secret;"
        as: programmer
        expect:
          error: E_PERM
      - run: "{obj}.audit_secret = 11;"
        as: programmer
        expect:
          error: E_PERM
    cleanup:
      - run: "recycle({obj});"
        as: wizard

  - name: audit_intrinsic_command_table_roundtrip
    description: Toast exposes exactly the intrinsic command table through the intrinsic-commands connection option.
    steps:
      - run: |
          before = connection_options(player, "intrinsic-commands");
          set_connection_option(player, "intrinsic-commands", {"PREFIX", "SUFFIX"});
          subset = connection_options(player, "intrinsic-commands");
          set_connection_option(player, "intrinsic-commands", 1);
          restored = connection_options(player, "intrinsic-commands");
          return {before, subset, restored};
        as: wizard
        expect:
          value:
            -
              - ".program"
              - PREFIX
              - SUFFIX
              - OUTPUTPREFIX
              - OUTPUTSUFFIX
            -
              - PREFIX
              - SUFFIX
            -
              - ".program"
              - PREFIX
              - SUFFIX
              - OUTPUTPREFIX
              - OUTPUTSUFFIX
    cleanup:
      - run: 'set_connection_option(player, "intrinsic-commands", 1);'
        as: wizard

  - name: audit_intrinsic_command_table_rejects_unknown
    description: Toast rejects unknown intrinsic command names in the intrinsic-commands connection option.
    steps:
      - run: 'set_connection_option(player, "intrinsic-commands", {"PREFIX", "NOT_A_TOAST_INTRINSIC"});'
        as: wizard
        expect:
          error: E_INVARG
    cleanup:
      - run: 'set_connection_option(player, "intrinsic-commands", 1);'
        as: wizard

  - name: audit_command_dispatch_ignores_execute_flag
    description: Toast command dispatch executes matching verbs even when the verb lacks the x flag.
    steps:
      - run: |
          add_verb(player, {player, "d", "auditnoexec"}, {"none", "none", "none"});
          set_verb_code(player, "auditnoexec", {"notify(player, \"EXECUTED\");"});
          return 1;
        as: wizard
      - command: "auditnoexec"
        expect:
          output:
            - "EXECUTED"
    cleanup:
      - run: 'delete_verb(player, "auditnoexec");'
        as: wizard

  - name: audit_task_local_not_inherited_by_fork
    description: Forked tasks start with empty Toast task_local state even when the parent task has task-local data.
    steps:
      - run: |
          try
            add_property(#0, "audit_task_local_value", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          set_task_local({"parent", 7});
          fork (0)
            suspend(0);
            #0.audit_task_local_value = task_local();
          endfork
          suspend(0);
          suspend(0);
          return #0.audit_task_local_value;
        as: wizard
        expect:
          value: {}
    cleanup:
      - run: 'delete_property(#0, "audit_task_local_value");'
        as: wizard

  - name: audit_waif_callers_preserve_this_and_verb_location
    description: callers() reports WAIF this values and the WAIF class as verb location.
    steps:
      - run: |
          obj = create($waif);
          add_verb(obj, {player, "xd", ":audit_a"}, {"this", "none", "this"});
          set_verb_code(obj, ":audit_a", {"return callers();"});
          add_verb(obj, {player, "xd", ":audit_b"}, {"this", "none", "this"});
          set_verb_code(obj, ":audit_b", {"return this:audit_a();"});
          add_verb(obj, {player, "xd", ":audit_c"}, {"this", "none", "this"});
          set_verb_code(obj, ":audit_c", {
            "c = this:audit_b();",
            "return {{c[1][2], typeof(c[1][1]) == WAIF, c[1][4] == this.class}, {c[2][2], typeof(c[2][1]) == WAIF, c[2][4] == this.class}};"
          });
          waif = obj:new();
          result = waif:audit_c();
          recycle(obj);
          return result;
        as: wizard
        expect:
          value:
            -
              - ":audit_b"
              - 1
              - 1
            -
              - ":audit_c"
              - 1
              - 1

  - name: audit_move_wizard_calls_accept_but_overrides_false
    description: move() calls destination :accept for wizards, but wizards still move when :accept returns false.
    steps:
      - run: |
          try
            add_property(#0, "audit_move_accept_seen", $nothing, {#0, "rw"});
          except (E_INVARG)
          endtry
          thing = create($nothing);
          dest = create($nothing);
          add_verb(dest, {player, "xd", "accept"}, {"this", "none", "this"});
          set_verb_code(dest, "accept", {
            "#0.audit_move_accept_seen = args[1];",
            "return 0;"
          });
          move(thing, dest);
          result = {#0.audit_move_accept_seen == thing, thing.location == dest};
          recycle(thing);
          recycle(dest);
          delete_property(#0, "audit_move_accept_seen");
          return result;
        as: wizard
        expect:
          value:
            - 1
            - 1

  - name: audit_chparent_nonwizard_requires_fertile_parent
    description: chparent() denies non-wizards using a non-fertile parent they do not own.
    steps:
      - run: |
          parent_obj = create($nothing);
          parent_obj.f = 0;
          return parent_obj;
        capture: parent_obj
        as: wizard
      - run: |
          child = create($nothing);
          return child;
        capture: child
        as: programmer
      - run: "chparent({child}, {parent_obj});"
        as: programmer
        expect:
          error: E_PERM
    cleanup:
      - run: |
          recycle({child});
          recycle({parent_obj});
        as: wizard
