name: mongoose_login_location
description: Mongoose login hook location behavior for the Codex profile

requires:
  config:
    - managed_server

tests:
  - name: codex_login_moves_to_patio
    permission: wizard
    steps:
      - run: |
          return {#14322.location, #14322.location.name};
        expect:
          value:
            - "#9407"
            - "The Patio"
