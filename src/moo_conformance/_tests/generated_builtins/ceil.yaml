name: generated_builtin_signature_ceil
description: Generated conformance tests for ceil() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - ceil
tests:
- name: ceil_function_info_signature_matches_source
  permission: wizard
  code: function_info("ceil")
  expect:
    value:
    - ceil
    - 1
    - 1
    - - 9
- name: ceil_too_few_args
  permission: wizard
  code: ceil()
  expect:
    error: E_ARGS
- name: ceil_too_many_args
  permission: wizard
  code: ceil(1.5, 1)
  expect:
    error: E_ARGS
- name: ceil_arg_1_rejects_wrong_type
  permission: wizard
  code: ceil("x")
  expect:
    error: E_TYPE
