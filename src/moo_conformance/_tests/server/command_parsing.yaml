name: command_parsing
description: Tests for command parsing and the "huh" mechanism

requires:
  builtins: [add_property, delete_property, add_verb, set_verb_code, notify]
  features: [command_dispatch, server_options]

teardown:
  permission: wizard
  code: |
    try
      delete_property($server_options, "player_huh");
    except (E_INVARG)
    endtry

tests:
  - name: location_huh_works_without_player_huh_option
    description: Without player_huh, the location huh verb handles unknown commands
    permission: wizard
    steps:
      - run: |
          room = player.location;
          add_verb(room, {player, "xd", "huh"}, {"none", "none", "none"});
          set_verb_code(room, "huh", {
            "notify(player, \"LOCATION_HUH\");"
          });
          return 1;
      - command: "zip"
        expect:
          output: "LOCATION_HUH"
    cleanup:
      - run: |
          try
            delete_verb(player.location, "huh");
          except (ANY)
          endtry

  - name: huh_calls_player_verb_with_player_huh_enabled
    description: With player_huh enabled, the player's huh verb is called
    permission: wizard
    steps:
      - run: |
          try
            add_property($server_options, "player_huh", 1, {player, "r"});
          except (E_INVARG)
          endtry
          $server_options.player_huh = 1;
          add_verb(player, {player, "xd", "huh"}, {"none", "none", "none"});
          set_verb_code(player, "huh", {
            "notify(player, \"PLAYER_HUH\");"
          });
          room = player.location;
          add_verb(room, {player, "xd", "huh"}, {"none", "none", "none"});
          set_verb_code(room, "huh", {
            "notify(player, \"LOCATION_HUH\");"
          });
          return 1;
      - command: "zap"
        expect:
          output: "PLAYER_HUH"
    cleanup:
      - run: |
          try
            delete_verb(player, "huh");
          except (ANY)
          endtry
      - run: |
          try
            delete_verb(player.location, "huh");
          except (ANY)
          endtry

  - name: huh_calls_location_verb_with_player_huh_disabled
    description: With player_huh disabled, the location huh verb handles unknown commands
    permission: wizard
    steps:
      - run: |
          try
            add_property($server_options, "player_huh", 1, {player, "r"});
          except (E_INVARG)
          endtry
          $server_options.player_huh = 0;
          add_verb(player, {player, "xd", "huh"}, {"none", "none", "none"});
          set_verb_code(player, "huh", {
            "notify(player, \"PLAYER_HUH\");"
          });
          room = player.location;
          add_verb(room, {player, "xd", "huh"}, {"none", "none", "none"});
          set_verb_code(room, "huh", {
            "notify(player, \"LOCATION_HUH\");"
          });
          return 1;
      - command: "zop"
        expect:
          output: "LOCATION_HUH"
    cleanup:
      - run: |
          try
            delete_verb(player, "huh");
          except (ANY)
          endtry
      - run: |
          try
            delete_verb(player.location, "huh");
          except (ANY)
          endtry

  - name: location_huh_disabled_with_player_huh_enabled
    description: With player_huh enabled, the location huh verb is suppressed
    permission: wizard
    steps:
      - run: |
          try
            add_property($server_options, "player_huh", 1, {player, "r"});
          except (E_INVARG)
          endtry
          $server_options.player_huh = 1;
          add_verb(player, {player, "xd", "huh"}, {"none", "none", "none"});
          set_verb_code(player, "huh", {
            "notify(player, \"PLAYER_HUH\");"
          });
          room = player.location;
          add_verb(room, {player, "xd", "huh"}, {"none", "none", "none"});
          set_verb_code(room, "huh", {
            "notify(player, \"LOCATION_HUH\");"
          });
          return 1;
      - command: "zaz"
        expect:
          output: "PLAYER_HUH"
    cleanup:
      - run: |
          try
            delete_verb(player, "huh");
          except (ANY)
          endtry
      - run: |
          try
            delete_verb(player.location, "huh");
          except (ANY)
          endtry
