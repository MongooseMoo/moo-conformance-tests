name: all_members_call_shapes
description: Table-driven TYPE_ANY coverage for all_members().

requires:
  builtins:
    - all_members

tests:
  - name: all_members_value_type_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [int, "1"]
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: "all_members({expr}, {})"
    expect:
      result: {}
