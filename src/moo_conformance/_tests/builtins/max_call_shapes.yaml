name: max_call_shapes
description: Table-driven numeric coverage for max().

requires:
  builtins:
    - max

tests:
  - name: max_float_unary
    permission: wizard
    code: "max(1.5) == 1.5"
    expect:
      value: 1

  - name: max_float_int
    permission: wizard
    code: "max(1.5, 1)"
    expect:
      error: E_TYPE

  - name: max_int_invalid_second_arg_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [obj, "max(1, #0)"]
        - [str, 'max(1, "x")']
        - [err, "max(1, E_ARGS)"]
        - [list, "max(1, {})"]
        - [map, "max(1, [1 -> 2])"]
    code: "{expr}"
    expect:
      error: E_TYPE

  - name: max_float_invalid_second_arg_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [obj, "max(1.5, #0)"]
        - [str, 'max(1.5, "x")']
        - [err, "max(1.5, E_ARGS)"]
        - [list, "max(1.5, {})"]
        - [map, "max(1.5, [1 -> 2])"]
    code: "{expr}"
    expect:
      error: E_TYPE
