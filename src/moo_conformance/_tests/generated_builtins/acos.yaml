name: generated_builtin_signature_acos
description: Generated conformance tests for acos() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - acos
tests:
- name: acos_function_info_signature_matches_source
  permission: wizard
  code: function_info("acos")
  expect:
    value:
    - acos
    - 1
    - 1
    - - 9
- name: acos_too_few_args
  permission: wizard
  code: acos()
  expect:
    error: E_ARGS
- name: acos_too_many_args
  permission: wizard
  code: acos(1.5, 1)
  expect:
    error: E_ARGS
- name: acos_arg_1_rejects_wrong_type
  permission: wizard
  code: acos("x")
  expect:
    error: E_TYPE
