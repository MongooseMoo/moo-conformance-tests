name: generated_builtin_signature_floor
description: Generated conformance tests for floor() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - floor
tests:
- name: floor_function_info_signature_matches_source
  permission: wizard
  code: function_info("floor")
  expect:
    value:
    - floor
    - 1
    - 1
    - - 9
- name: floor_too_few_args
  permission: wizard
  code: floor()
  expect:
    error: E_ARGS
- name: floor_too_many_args
  permission: wizard
  code: floor(1.5, 1)
  expect:
    error: E_ARGS
- name: floor_arg_1_rejects_wrong_type
  permission: wizard
  code: floor("x")
  expect:
    error: E_TYPE
