name: generated_builtin_signature_cos
description: Generated conformance tests for cos() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - cos
tests:
- name: cos_function_info_signature_matches_source
  permission: wizard
  code: function_info("cos")
  expect:
    value:
    - cos
    - 1
    - 1
    - - 9
- name: cos_too_few_args
  permission: wizard
  code: cos()
  expect:
    error: E_ARGS
- name: cos_too_many_args
  permission: wizard
  code: cos(1.5, 1)
  expect:
    error: E_ARGS
- name: cos_arg_1_rejects_wrong_type
  permission: wizard
  code: cos("x")
  expect:
    error: E_TYPE
