name: generated_builtin_signature_parent
description: Generated conformance tests for parent() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - parent
tests:
- name: parent_function_info_signature_matches_source
  permission: wizard
  code: function_info("parent")
  expect:
    value:
    - parent
    - 1
    - 1
    - - -1
- name: parent_too_few_args
  permission: wizard
  code: parent()
  expect:
    error: E_ARGS
- name: parent_too_many_args
  permission: wizard
  code: parent(1, 1)
  expect:
    error: E_ARGS
- name: parent_runtime_outcome_matches_inferred_types
  permission: wizard
  statement: "try\n  result = parent(1);\n  return typeof(result) == OBJ;\nexcept\
    \ e (E_INVARG, E_TYPE)\n  return 1;\nendtry\n"
  expect:
    value: 1
