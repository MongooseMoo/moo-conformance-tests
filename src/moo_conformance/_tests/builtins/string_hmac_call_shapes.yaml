name: string_hmac_call_shapes
description: Table-driven TYPE_ANY coverage for string_hmac().

requires:
  builtins:
    - string_hmac

tests:
  - name: string_hmac_binary_flag_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [int, "1"]
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: 'string_hmac("abc", "key", "sha256", {expr})'
    expect:
      type: str
