name: generated_builtin_signature_sqrt
description: Generated conformance tests for sqrt() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - sqrt
tests:
- name: sqrt_function_info_signature_matches_source
  permission: wizard
  code: function_info("sqrt")
  expect:
    value:
    - sqrt
    - 1
    - 1
    - - 9
- name: sqrt_too_few_args
  permission: wizard
  code: sqrt()
  expect:
    error: E_ARGS
- name: sqrt_too_many_args
  permission: wizard
  code: sqrt(1.5, 1)
  expect:
    error: E_ARGS
- name: sqrt_arg_1_rejects_wrong_type
  permission: wizard
  code: sqrt("x")
  expect:
    error: E_TYPE
