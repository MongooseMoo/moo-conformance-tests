name: generated_builtin_signature_notify
description: Generated conformance tests for notify() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - notify
tests:
- name: notify_function_info_signature_matches_source
  permission: wizard
  code: function_info("notify")
  expect:
    value:
    - notify
    - 2
    - 4
    - - 1
      - 2
      - -1
      - -1
- name: notify_too_few_args
  permission: wizard
  code: notify()
  expect:
    error: E_ARGS
- name: notify_too_many_args
  permission: wizard
  code: notify(#0, "x", 1, 1, 1)
  expect:
    error: E_ARGS
- name: notify_arg_1_rejects_wrong_type
  permission: wizard
  code: notify("x", "x")
  expect:
    error: E_TYPE
- name: notify_arg_2_rejects_wrong_type
  permission: wizard
  code: notify(#0, 1)
  expect:
    error: E_TYPE
