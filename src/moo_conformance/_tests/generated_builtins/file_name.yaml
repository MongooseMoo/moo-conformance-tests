name: generated_builtin_signature_file_name
description: Generated conformance tests for file_name() builtin signature, derived
  from Toast source.
requires:
  builtins:
  - function_info
  - file_name
tests:
- name: file_name_function_info_signature_matches_source
  permission: wizard
  code: function_info("file_name")
  expect:
    value:
    - file_name
    - 1
    - 1
    - - 0
- name: file_name_too_few_args
  permission: wizard
  code: file_name()
  expect:
    error: E_ARGS
- name: file_name_too_many_args
  permission: wizard
  code: file_name(1, 1)
  expect:
    error: E_ARGS
- name: file_name_arg_1_rejects_wrong_type
  permission: wizard
  code: file_name("x")
  expect:
    error: E_TYPE
