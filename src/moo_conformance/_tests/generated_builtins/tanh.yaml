name: generated_builtin_signature_tanh
description: Generated conformance tests for tanh() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - tanh
tests:
- name: tanh_function_info_signature_matches_source
  permission: wizard
  code: function_info("tanh")
  expect:
    value:
    - tanh
    - 1
    - 1
    - - 9
- name: tanh_too_few_args
  permission: wizard
  code: tanh()
  expect:
    error: E_ARGS
- name: tanh_too_many_args
  permission: wizard
  code: tanh(1.5, 1)
  expect:
    error: E_ARGS
- name: tanh_arg_1_rejects_wrong_type
  permission: wizard
  code: tanh("x")
  expect:
    error: E_TYPE
