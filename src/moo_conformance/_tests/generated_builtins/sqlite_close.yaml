name: generated_builtin_signature_sqlite_close
description: Generated conformance tests for sqlite_close() builtin signature, derived
  from Toast source.
requires:
  builtins:
  - function_info
  - sqlite_close
tests:
- name: sqlite_close_function_info_signature_matches_source
  permission: wizard
  code: function_info("sqlite_close")
  expect:
    value:
    - sqlite_close
    - 1
    - 1
    - - 0
- name: sqlite_close_too_few_args
  permission: wizard
  code: sqlite_close()
  expect:
    error: E_ARGS
- name: sqlite_close_too_many_args
  permission: wizard
  code: sqlite_close(1, 1)
  expect:
    error: E_ARGS
- name: sqlite_close_arg_1_rejects_wrong_type
  permission: wizard
  code: sqlite_close("x")
  expect:
    error: E_TYPE
- name: sqlite_close_runtime_outcome_matches_inferred_types
  permission: wizard
  statement: "try\n  result = sqlite_close(1);\n  return typeof(result) == INT;\n\
    except e (E_INVARG, E_PERM)\n  return 1;\nendtry\n"
  expect:
    value: 1
