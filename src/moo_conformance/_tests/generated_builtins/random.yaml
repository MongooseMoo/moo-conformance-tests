name: generated_builtin_signature_random
description: Generated conformance tests for random() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - random
tests:
- name: random_function_info_signature_matches_source
  permission: wizard
  code: function_info("random")
  expect:
    value:
    - random
    - 0
    - 2
    - - 0
      - 0
- name: random_too_many_args
  permission: wizard
  code: random(1, 1, 1)
  expect:
    error: E_ARGS
- name: random_arg_1_rejects_wrong_type
  permission: wizard
  code: random("x")
  expect:
    error: E_TYPE
- name: random_arg_2_rejects_wrong_type
  permission: wizard
  code: random(1, "x")
  expect:
    error: E_TYPE
