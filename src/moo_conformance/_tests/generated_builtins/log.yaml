name: generated_builtin_signature_log
description: Generated conformance tests for log() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - log
tests:
- name: log_function_info_signature_matches_source
  permission: wizard
  code: function_info("log")
  expect:
    value:
    - log
    - 1
    - 1
    - - 9
- name: log_too_few_args
  permission: wizard
  code: log()
  expect:
    error: E_ARGS
- name: log_too_many_args
  permission: wizard
  code: log(1.5, 1)
  expect:
    error: E_ARGS
- name: log_arg_1_rejects_wrong_type
  permission: wizard
  code: log("x")
  expect:
    error: E_TYPE
