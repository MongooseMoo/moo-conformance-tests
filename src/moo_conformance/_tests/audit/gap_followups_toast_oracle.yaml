name: audit_gap_followups_toast_oracle
description: Toast-confirmed audit follow-ups for property flags, command execute flags, and task-local propagation.

requires:
  builtins:
    - add_property
    - delete_property
    - add_verb
    - delete_verb
    - set_verb_code
    - callers
    - create
    - recycle
    - move
    - chparent
    - parent
    - set_task_local
    - task_local
    - suspend

tests:
  - name: audit_property_flags_deny_nonowner_read_and_write
    description: Property read/write flags deny non-owner programmers like Toast.
    steps:
      - run: |
          obj = create($nothing);
          obj.w = 0;
          add_property(obj, "audit_secret", 10, {#0, ""});
          return obj;
        capture: obj
        as: wizard
      - run: "return {obj}.audit_secret;"
        as: programmer
        expect:
          error: E_PERM
      - run: "{obj}.audit_secret = 11;"
        as: programmer
        expect:
          error: E_PERM
    cleanup:
      - run: "recycle({obj});"
        as: wizard

  - name: audit_command_dispatch_ignores_execute_flag
    description: Toast command dispatch executes matching verbs even when the verb lacks the x flag.
    steps:
      - run: |
          add_verb(player, {player, "d", "auditnoexec"}, {"none", "none", "none"});
          set_verb_code(player, "auditnoexec", {"notify(player, \"EXECUTED\");"});
          return 1;
        as: wizard
      - command: "auditnoexec"
        expect:
          output:
            - "EXECUTED"
    cleanup:
      - run: 'delete_verb(player, "auditnoexec");'
        as: wizard

  - name: audit_task_local_not_inherited_by_fork
    description: Forked tasks start with empty Toast task_local state even when the parent task has task-local data.
    steps:
      - run: |
          try
            add_property(#0, "audit_task_local_value", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          set_task_local({"parent", 7});
          fork (0)
            suspend(0);
            #0.audit_task_local_value = task_local();
          endfork
          suspend(0);
          suspend(0);
          return #0.audit_task_local_value;
        as: wizard
        expect:
          value: {}
    cleanup:
      - run: 'delete_property(#0, "audit_task_local_value");'
        as: wizard

  - name: audit_waif_callers_preserve_this_and_verb_location
    description: callers() reports WAIF this values and the WAIF class as verb location.
    steps:
      - run: |
          obj = create($waif);
          add_verb(obj, {player, "xd", ":audit_a"}, {"this", "none", "this"});
          set_verb_code(obj, ":audit_a", {"return callers();"});
          add_verb(obj, {player, "xd", ":audit_b"}, {"this", "none", "this"});
          set_verb_code(obj, ":audit_b", {"return this:audit_a();"});
          add_verb(obj, {player, "xd", ":audit_c"}, {"this", "none", "this"});
          set_verb_code(obj, ":audit_c", {
            "c = this:audit_b();",
            "return {{c[1][2], typeof(c[1][1]) == WAIF, c[1][4] == this.class}, {c[2][2], typeof(c[2][1]) == WAIF, c[2][4] == this.class}};"
          });
          waif = obj:new();
          result = waif:audit_c();
          recycle(obj);
          return result;
        as: wizard
        expect:
          value:
            -
              - ":audit_b"
              - 1
              - 1
            -
              - ":audit_c"
              - 1
              - 1

  - name: audit_move_wizard_calls_accept_but_overrides_false
    description: move() calls destination :accept for wizards, but wizards still move when :accept returns false.
    steps:
      - run: |
          try
            add_property(#0, "audit_move_accept_seen", $nothing, {#0, "rw"});
          except (E_INVARG)
          endtry
          thing = create($nothing);
          dest = create($nothing);
          add_verb(dest, {player, "xd", "accept"}, {"this", "none", "this"});
          set_verb_code(dest, "accept", {
            "#0.audit_move_accept_seen = args[1];",
            "return 0;"
          });
          move(thing, dest);
          result = {#0.audit_move_accept_seen == thing, thing.location == dest};
          recycle(thing);
          recycle(dest);
          delete_property(#0, "audit_move_accept_seen");
          return result;
        as: wizard
        expect:
          value:
            - 1
            - 1

  - name: audit_chparent_nonwizard_requires_fertile_parent
    description: chparent() denies non-wizards using a non-fertile parent they do not own.
    steps:
      - run: |
          parent_obj = create($nothing);
          parent_obj.f = 0;
          return parent_obj;
        capture: parent_obj
        as: wizard
      - run: |
          child = create($nothing);
          return child;
        capture: child
        as: programmer
      - run: "chparent({child}, {parent_obj});"
        as: programmer
        expect:
          error: E_PERM
    cleanup:
      - run: |
          recycle({child});
          recycle({parent_obj});
        as: wizard
