    error: E_ARGS
- name: atan2_arg_1_rejects_wrong_type
  permission: wizard
  code: atan2("x", 1.5)
  expect:
    error: E_TYPE
- name: atan2_arg_2_rejects_wrong_type
  permission: wizard
  code: atan2(1.5, "x")
  expect:
    error: E_TYPE
- name: atan2_runtime_outcome_matches_inferred_types
  permission: wizard
  statement: "try\n  result = atan2(1.5, 1.5);\n  return typeof(result) == FLOAT;\n\
    except e (E_INVARG)\n  return 1;\nendtry\n"
  expect:
