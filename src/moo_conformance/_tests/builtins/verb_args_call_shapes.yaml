name: verb_args_call_shapes
description: Product-table receiver and descriptor call-shape coverage for verb_args().

requires:
  builtins:
    - verb_args

tests:
  - name: verb_args_rejects_missing_or_invalid_shape_{object_kind}_{desc_kind}
    permission: wizard
    table:
      product:
        - columns: [object_kind, object_expr]
          rows:
            - [int, "1"]
            - [float, "1.5"]
            - [obj, "#0"]
            - [str, '"x"']
            - [err, "E_ARGS"]
            - [list, "{}"]
            - [map, "[1 -> 2]"]
        - columns: [desc_kind, desc_expr]
          rows:
            - [int, "999999"]
            - [float, "1.5"]
            - [obj, "#0"]
            - [str, '"no_such_verb"']
            - [err, "E_ARGS"]
            - [list, "{}"]
            - [map, "[1 -> 2]"]
    code: "`verb_args({object_expr}, {desc_expr}) ! ANY => 1'"
    expect:
      value: 1
