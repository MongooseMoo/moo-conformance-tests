name: http
description: HTTP request/response parsing builtin (read_http)

requires:
  builtins: [read_http, read, force_input, set_connection_option, kill_task, boot_player]

tests:
  - name: non_wizard_cannot_call_no_arg_version
    permission: programmer
    code: 'read_http("request")'
    expect:
      error: E_PERM

  - name: read_http_no_args_fails
    permission: wizard
    code: 'read_http()'
    expect:
      error: E_ARGS

  - name: read_http_invalid_type_foobar
    permission: wizard
    code: 'read_http("foobar")'
    expect:
      error: E_INVARG

  - name: read_http_invalid_type_empty_string
    permission: wizard
    code: 'read_http("")'
    expect:
      error: E_INVARG

  - name: read_http_type_arg_not_string
    permission: wizard
    code: 'read_http(1)'
    expect:
      error: E_TYPE

  - name: read_http_connection_arg_not_obj
    permission: wizard
    code: 'read_http("request", "foo")'
    expect:
      error: E_TYPE

  - name: read_http_forced_invalid_input_returns_zero
    description: Invalid forced input is ignored and read_http returns 0
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "~ZZ~!!");
      endfork;
      result = read_http("request");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      return result;
    expect:
      value: 0

  - name: read_http_bad_request_invalid_method
    description: Malformed request lines report INVALID_METHOD
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "foobar~0D~0A");
      endfork;
      result = read_http("request");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      return result["error"][1];
    expect:
      value: "INVALID_METHOD"

  - name: read_http_bad_request_invalid_path
    description: Invalid request paths report INVALID_PATH
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "GET /~FFbad HTTP/1.1~0D~0A");
      endfork;
      result = read_http("request");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      return result["error"][1];
    expect:
      value: "INVALID_PATH"

  - name: read_http_bad_request_invalid_header_token
    description: Invalid request headers report INVALID_HEADER_TOKEN
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "GET /bad HTTP/1.1~0D~0A");
        force_input(player, "foo~00bar~0D~0A");
      endfork;
      result = read_http("request");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      return result["error"][1];
    expect:
      value: "INVALID_HEADER_TOKEN"

  - name: read_http_bad_response_invalid_constant
    description: Malformed response constants report INVALID_CONSTANT
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "foobar~0D~0A");
      endfork;
      result = read_http("response");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      return result["error"][1];
    expect:
      value: "INVALID_CONSTANT"

  - name: read_http_bad_response_invalid_status
    description: Invalid response status fields report INVALID_STATUS
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "HTTP/1.1 2~00~00 Yow~0D~0A");
      endfork;
      result = read_http("response");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      return result["error"][1];
    expect:
      value: "INVALID_STATUS"

  - name: read_http_bad_response_invalid_header_token
    description: Invalid response headers report INVALID_HEADER_TOKEN
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "HTTP/1.1 404 Not Found~0D~0A");
        force_input(player, "foo~FFbar~0D~0A");
      endfork;
      result = read_http("response");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      return result["error"][1];
    expect:
      value: "INVALID_HEADER_TOKEN"

  - name: read_http_chopped_up_requests_work
    description: Chopped-up requests parse correctly
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        for piece in ({
          "G", "E", "T", " ", "/", "t", "e", "s", "t", " ", "H", "T", "T", "P", "/", "1", ".", "1",
          "~0D~0A", "h", "e", "a", "d", "e", "r", ":", " ", "t", "e", "s", "t", "~0D~0A", "~0D~0A"
        })
          force_input(player, piece);
        endfor
      endfork;
      result = read_http("request");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      body = #-1;
      if ("body" in mapkeys(result))
        body = result["body"];
      endif
      return {result["method"], result["uri"], result["headers"], body};
    expect:
      value:
        - "GET"
        - "/test"
        - {header: "test"}
        - "#-1"

  - name: read_http_chopped_up_responses_work
    description: Chopped-up responses parse correctly
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        for piece in ({
          "H", "T", "T", "P", "/", "1", ".", "1", " ", "2", "0", "0", " ", "O", "K",
          "~0D~0A", "h", "e", "a", "d", "e", "r", ":", " ", "t", "e", "s", "t", "~0D~0A", "~0D~0A"
        })
          force_input(player, piece);
        endfor
      endfork;
      result = read_http("response");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      body = #-1;
      if ("body" in mapkeys(result))
        body = result["body"];
      endif
      return {result["status"], result["headers"], body};
    expect:
      value:
        - 200
        - {header: "test"}
        - "#-1"

  - name: read_http_no_headers_no_body_request_works
    description: Simple requests without headers or body parse correctly
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "GET /get_no_headers_no_body/world HTTP/1.1~0D~0A");
        force_input(player, "~0D~0A");
      endfork;
      result = read_http("request");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      body = #-1;
      if ("body" in mapkeys(result))
        body = result["body"];
      endif
      return {result["method"], result["uri"], result["headers"], body};
    expect:
      value:
        - "GET"
        - "/get_no_headers_no_body/world"
        - {}
        - "#-1"

  - name: read_http_one_header_no_body_request_works
    description: Requests with a single header and no body parse correctly
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "GET /get_one_header_no_body HTTP/1.1~0D~0A");
        force_input(player, "Accept: */*~0D~0A");
        force_input(player, "~0D~0A");
      endfork;
      result = read_http("request");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      body = #-1;
      if ("body" in mapkeys(result))
        body = result["body"];
      endif
      return {result["method"], result["uri"], result["headers"], body};
    expect:
      value:
        - "GET"
        - "/get_one_header_no_body"
        - {Accept: "*/*"}
        - "#-1"

  - name: read_http_funky_content_length_request_works
    description: Content-Length is honored even on HTTP/1.0 requests
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "GET /get_funky_content_length_body_hello HTTP/1.0~0D~0A");
        force_input(player, "conTENT-Length: 5~0D~0A");
        force_input(player, "~0D~0A");
        force_input(player, "HELLO");
      endfork;
      result = read_http("request");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      return {result["method"], result["uri"], result["headers"], result["body"]};
    expect:
      value:
        - "GET"
        - "/get_funky_content_length_body_hello"
        - {conTENT-Length: "5"}
        - "HELLO"

  - name: read_http_chunked_all_your_base_request_works
    description: Chunked requests are decoded and concatenated correctly
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "POST /post_chunked_all_your_base HTTP/1.1~0D~0A");
        force_input(player, "Transfer-Encoding: chunked~0D~0A");
        force_input(player, "~0D~0A");
        force_input(player, "1e~0D~0Aall your base are belong to us~0D~0A");
        force_input(player, "0~0D~0A");
        force_input(player, "~0D~0A");
      endfork;
      result = read_http("request");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      return {result["method"], result["uri"], result["headers"], result["body"]};
    expect:
      value:
        - "POST"
        - "/post_chunked_all_your_base"
        - {Transfer-Encoding: "chunked"}
        - "all your base are belong to us"

  - name: read_http_line_folding_in_header_request_works
    description: Folded request headers are unfolded correctly
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "GET / HTTP/1.1~0D~0A");
        force_input(player, "Line1:   abc~0D~0A");
        force_input(player, "~09def~0D~0A");
        force_input(player, " ghi~0D~0A");
        force_input(player, "~09~09jkl~0D~0A");
        force_input(player, "  mno ~0D~0A");
        force_input(player, "~09 ~09qrs~0D~0A");
        force_input(player, "Line2: ~09 line2~09~0D~0A");
        force_input(player, "~0D~0A");
      endfork;
      result = read_http("request");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      return {result["headers"]["Line1"], result["headers"]["Line2"]};
    expect:
      value:
        - "abcdefghijklmno qrs"
        - "line2~09"

  - name: read_http_no_headers_no_body_response_works
    description: Simple responses without headers or body parse correctly
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "HTTP/1.1 404 Not Found~0D~0A~0D~0A");
      endfork;
      result = read_http("response");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      body = #-1;
      if ("body" in mapkeys(result))
        body = result["body"];
      endif
      return {result["status"], result["headers"], body};
    expect:
      value:
        - 404
        - {}
        - "#-1"

  - name: read_http_no_reason_phrase_response_works
    description: Responses without a reason phrase still parse
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "HTTP/1.1 301~0D~0A~0D~0A");
      endfork;
      result = read_http("response");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      body = #-1;
      if ("body" in mapkeys(result))
        body = result["body"];
      endif
      return {result["status"], result["headers"], body};
    expect:
      value:
        - 301
        - {}
        - "#-1"

  - name: read_http_trailing_space_on_chunked_body_works
    description: Trailing whitespace on chunk sizes is tolerated
    permission: wizard
    statement: |
      set_connection_option(player, "hold-input", 1);
      set_connection_option(player, "binary", 1);
      fork (0)
        force_input(player, "HTTP/1.1 200 OK~0D~0A");
        force_input(player, "Content-Type: text/plain~0D~0A");
        force_input(player, "Transfer-Encoding: chunked~0D~0A");
        force_input(player, "~0D~0A");
        force_input(player, "25  ~0D~0A");
        force_input(player, "This is the data in the first chunk~0D~0A");
        force_input(player, "~0D~0A");
        force_input(player, "1C~0D~0A");
        force_input(player, "and this is the second one~0D~0A");
        force_input(player, "~0D~0A");
        force_input(player, "0  ~0D~0A");
        force_input(player, "~0D~0A");
      endfork;
      result = read_http("response");
      set_connection_option(player, "hold-input", 0);
      set_connection_option(player, "binary", 0);
      return {result["status"], result["headers"], result["body"]};
    expect:
      value:
        - 200
        - {Content-Type: "text/plain", Transfer-Encoding: "chunked"}
        - "This is the data in the first chunk~0D~0Aand this is the second one~0D~0A"

  - name: read_http_read_conflicts_with_read_on_same_connection
    description: read() fails when the same connection is already blocked in read_http()
    permission: wizard
    steps:
      - run: |
          try
            add_property(#0, "__http_lifecycle_conn", #-1, {#0, "rw"});
          except (ANY)
          endtry
          return 1;
      - new_connection:
          capture: conn1
      - send:
          connection: conn1
          text: "connect Wizard"
      - send:
          connection: conn1
          text: ";#0.__http_lifecycle_conn = player;"
      - run: |
          conn = #0.__http_lifecycle_conn;
          set_connection_option(conn, "hold-input", 1);
          set_connection_option(conn, "binary", 1);
          fork task (0)
            read_http("request", conn);
            set_connection_option(conn, "hold-input", 0);
            set_connection_option(conn, "binary", 0);
          endfork;
          fork (0)
            suspend();
          endfork;
          return task;
      - run: "return read(#0.__http_lifecycle_conn);"
        expect:
          error: E_INVARG
      - close_connection: conn1
    cleanup:
      - run: |
          try
            delete_property(#0, "__http_lifecycle_conn");
          except (ANY)
          endtry
          return 1;
        as: wizard

  - name: read_http_killed_task_allows_fresh_reads
    description: Killing a suspended read_http task leaves the connection usable
    permission: wizard
    steps:
      - run: |
          try
            add_property(#0, "__http_lifecycle_conn", #-1, {#0, "rw"});
          except (ANY)
          endtry
          return 1;
      - new_connection:
          capture: conn1
      - send:
          connection: conn1
          text: "connect Wizard"
      - send:
          connection: conn1
          text: ";#0.__http_lifecycle_conn = player;"
      - run: |
          conn = #0.__http_lifecycle_conn;
          set_connection_option(conn, "hold-input", 1);
          set_connection_option(conn, "binary", 1);
          fork task (0)
            force_input(conn, "GET /1~0D~0Aone: two~0D~0A");
            read_http("request", conn);
            set_connection_option(conn, "hold-input", 0);
            set_connection_option(conn, "binary", 0);
          endfork;
          fork (0)
            suspend();
          endfork;
          return task;
        capture: http_task
      - run: "return kill_task({http_task});"
        expect:
          value: 0
      - run: |
          conn = #0.__http_lifecycle_conn;
          set_connection_option(conn, "hold-input", 1);
          set_connection_option(conn, "binary", 1);
          force_input(conn, "GET /2~0D~0Afoo: bar~0D~0A~0D~0A");
          result = read_http("request", conn);
          set_connection_option(conn, "hold-input", 0);
          set_connection_option(conn, "binary", 0);
          return {result["method"], result["uri"], result["headers"]};
        expect:
          value:
            - "GET"
            - "/2"
            - {foo: "bar"}
      - run: |
          conn = #0.__http_lifecycle_conn;
          set_connection_option(conn, "hold-input", 1);
          set_connection_option(conn, "binary", 1);
          force_input(conn, "HTTP/1.1 500 Error~0D~0Afoo: bar~0D~0A~0D~0A");
          result = read_http("response", conn);
          set_connection_option(conn, "hold-input", 0);
          set_connection_option(conn, "binary", 0);
          return {result["status"], result["headers"]};
        expect:
          value:
            - 500
            - {foo: "bar"}
      - close_connection: conn1
    cleanup:
      - run: |
          try
            delete_property(#0, "__http_lifecycle_conn");
          except (ANY)
          endtry
          return 1;
        as: wizard

  - name: read_http_abrupt_close_while_pending
    description: Closing a connection while read_http() is pending does not hang
    permission: wizard
    steps:
      - run: |
          try
            add_property(#0, "__http_lifecycle_conn", #-1, {#0, "rw"});
          except (ANY)
          endtry
          return 1;
      - new_connection:
          capture: conn1
      - send:
          connection: conn1
          text: "connect Wizard"
      - send:
          connection: conn1
          text: ";#0.__http_lifecycle_conn = player;"
      - run: |
          conn = #0.__http_lifecycle_conn;
          set_connection_option(conn, "hold-input", 1);
          set_connection_option(conn, "binary", 1);
          fork task (0)
            force_input(conn, "GET /1~0D~0Aone: two~0D~0A");
            read_http("request", conn);
            set_connection_option(conn, "hold-input", 0);
            set_connection_option(conn, "binary", 0);
          endfork;
          fork (0)
            suspend();
          endfork;
          return task;
        capture: http_task
      - run: |
          boot_player(#0.__http_lifecycle_conn);
          return 1;
        expect:
          value: 1
      - close_connection: conn1
    cleanup:
      - run: |
          try
            delete_property(#0, "__http_lifecycle_conn");
          except (ANY)
          endtry
          return 1;
        as: wizard
