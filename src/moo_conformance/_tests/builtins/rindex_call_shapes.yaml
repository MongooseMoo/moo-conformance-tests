name: rindex_call_shapes
description: Table-driven TYPE_ANY coverage for rindex().

requires:
  builtins:
    - rindex

tests:
  - name: rindex_third_arg_{kind}
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: 'rindex("foo", "o", {expr})'
    expect:
      type: int

  - name: rindex_third_arg_{kind}_with_start
    permission: wizard
    table:
      columns: [kind, expr]
      rows:
        - [float, "1.5"]
        - [obj, "#0"]
        - [str, '"x"']
        - [err, "E_ARGS"]
        - [list, "{}"]
        - [map, "[1 -> 2]"]
    code: 'rindex("foo", "o", {expr}, 0)'
    expect:
      type: int
