name: audit_time_server_builtins_toast_oracle
description: Toast-confirmed audit cases for time formatting and server-adjacent builtins.

requires:
  builtins:
    - ctime
    - ftime
    - shutdown
    - queue_info
    - set_property_info
    - memory_usage
    - load_server_options
    - add_property
    - delete_property
    - add_verb
    - delete_verb
    - verb_info
    - set_verb_info
    - verb_args
    - set_verb_args
    - verb_code
    - set_verb_code
    - create
    - recycle
    - valid
    - set_player_flag
    - boot_player
    - force_input
    - connected_players

tests:
  - name: audit_ctime_includes_full_timezone_name
    description: This Toast build formats ctime() with the full local timezone name.
    code: "ctime()"
    expect:
      match: "^\\w{3} \\w{3} .+ \\d{2}:\\d{2}:\\d{2} \\d{4} Mountain (Standard|Daylight) Time$"

  - name: audit_ctime_extreme_timestamp_rejected
    description: ctime rejects out-of-range endpoint timestamps with Toast's E_INVARG behavior.
    code: "ctime(2147483647)"
    expect:
      error: E_INVARG

  - name: audit_ftime_args_are_clock_selectors
    description: ftime(1) and ftime(2) are clock selectors returning floats, not timestamp formatters.
    statement: |
      a = ftime(1);
      b = ftime(2);
      return {typeof(a), typeof(b), a > 0.0, b >= 0.0};
    expect:
      value:
        - 9
        - 9
        - 1
        - 1

  - name: audit_shutdown_accepts_two_args_before_permission_check
    description: shutdown(message, delay) accepts Toast's optional second argument before rejecting non-wizards.
    permission: programmer
    code: 'shutdown("audit shutdown", 0)'
    expect:
      error: E_PERM

  - name: audit_queue_info_no_arg_allowed_for_programmer
    description: queue_info() with no arguments is allowed for non-wizards.
    permission: programmer
    code: "typeof(queue_info())"
    expect:
      value: 4

  - name: audit_queue_info_wizard_map_shape
    description: queue_info(player) for wizards returns Toast's connected-player map shape.
    permission: wizard
    statement: |
      info = queue_info(player);
      return {
        typeof(info),
        maphaskey(info, "player"),
        maphaskey(info, "connected"),
        maphaskey(info, "num_bg_tasks")
      };
    expect:
      value:
        - 10
        - 1
        - 1
        - 1

  - name: audit_set_property_info_requires_permission
    description: set_property_info denies non-owner programmers without change permission.
    steps:
      - run: |
          obj = create($nothing);
          obj.w = 0;
          add_property(obj, "auditprop", 1, {#0, "r"});
          return obj;
        capture: obj
        as: wizard
      - run: 'set_property_info({obj}, "auditprop", {player, "rw"})'
        as: programmer
        expect:
          error: E_PERM
    cleanup:
      - run: recycle({obj});
        as: wizard

  - name: audit_memory_usage_windows_behavior
    description: This Toast build returns E_FILE for memory_usage() on Windows.
    permission: programmer
    code: "memory_usage()"
    expect:
      error: E_FILE

  - name: audit_protected_builtin_dispatches_bf_verb
    description: $server_options.protect_length routes non-wizard length() calls through #0:bf_length.
    steps:
      - run: |
          try
            add_property(#0, "audit_protect_saved", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          old_exists = 1;
          try
            old_info = verb_info(#0, "bf_length");
            old_args = verb_args(#0, "bf_length");
            old_code = verb_code(#0, "bf_length");
          except (E_VERBNF)
            old_exists = 0;
            old_info = {};
            old_args = {};
            old_code = {};
          endtry
          #0.audit_protect_saved = {old_exists, old_info, old_args, old_code};
          try
            add_verb(#0, {#0, "rxd", "bf_length"}, {"this", "none", "this"});
          except (E_INVARG)
          endtry
          set_verb_info(#0, "bf_length", {#0, "rxd", "bf_length"});
          set_verb_args(#0, "bf_length", {"this", "none", "this"});
          set_verb_code(#0, "bf_length", {"return {\"protected\", args};"});
          try
            add_property($server_options, "protect_length", 1, {player, "r"});
          except (E_INVARG)
            $server_options.protect_length = 1;
          endtry
          load_server_options();
          return 1;
        as: wizard
      - run: "return length({1, 2, 3});"
        as: programmer
        expect:
          value:
            - protected
            -
              -
                - 1
                - 2
                - 3
    cleanup:
      - run: |
          try
            saved = #0.audit_protect_saved;
            if (saved[1])
              set_verb_info(#0, "bf_length", saved[2]);
              set_verb_args(#0, "bf_length", saved[3]);
              set_verb_code(#0, "bf_length", saved[4]);
            else
              delete_verb(#0, "bf_length");
            endif
          except (ANY)
          endtry
          try
            delete_property(#0, "audit_protect_saved");
          except (ANY)
          endtry
          try
            delete_property($server_options, "protect_length");
          except (ANY)
          endtry
          load_server_options();
        as: wizard

  - name: audit_set_player_flag_false_boots_active_player
    description: Clearing an active player's player flag boots its live connection.
    steps:
      - run: |
          try
            add_property(#0, "audit_player_flag_login", $nothing, {#0, "rw"});
          except (E_INVARG)
          endtry
          try
            add_property(#0, "audit_player_flag_saved", {}, {#0, "rw"});
          except (E_INVARG)
          endtry
          login_player = create($nothing);
          set_player_flag(login_player, 1);
          #0.audit_player_flag_login = login_player;
          old_exists = 1;
          try
            old_info = verb_info(#0, "do_login_command");
            old_args = verb_args(#0, "do_login_command");
            old_code = verb_code(#0, "do_login_command");
          except (E_VERBNF)
            old_exists = 0;
            old_info = {};
            old_args = {};
            old_code = {};
          endtry
          #0.audit_player_flag_saved = {old_exists, old_info, old_args, old_code};
          try
            add_verb(#0, {#0, "rxd", "do_login_command"}, {"this", "none", "this"});
          except (E_INVARG)
          endtry
          set_verb_info(#0, "do_login_command", {#0, "rxd", "do_login_command"});
          set_verb_args(#0, "do_login_command", {"this", "none", "this"});
          set_verb_code(#0, "do_login_command", {"return #0.audit_player_flag_login;"});
          return 1;
        as: wizard
      - new_connection:
          capture: conn1
      - run: |
          neg = #-1;
          for conn in (connected_players(1))
            if (!valid(conn))
              neg = conn;
            endif
          endfor
          force_input(neg, "audit-player-flag-login");
          suspend(0);
          was_connected = (#0.audit_player_flag_login in connected_players(1)) > 0;
          set_player_flag(#0.audit_player_flag_login, 0);
          suspend(0);
          return {was_connected, (#0.audit_player_flag_login in connected_players(1)) > 0};
        as: wizard
        expect:
          value:
            - 1
            - 0
      - close_connection: conn1
    cleanup:
      - run: |
          try
            saved = #0.audit_player_flag_saved;
            if (saved[1])
              set_verb_info(#0, "do_login_command", saved[2]);
              set_verb_args(#0, "do_login_command", saved[3]);
              set_verb_code(#0, "do_login_command", saved[4]);
            else
              delete_verb(#0, "do_login_command");
            endif
          except (ANY)
          endtry
          try
            boot_player(#0.audit_player_flag_login);
          except (ANY)
          endtry
          try
            recycle(#0.audit_player_flag_login);
          except (ANY)
          endtry
          try
            delete_property(#0, "audit_player_flag_saved");
          except (ANY)
          endtry
          try
            delete_property(#0, "audit_player_flag_login");
          except (ANY)
          endtry
        as: wizard
