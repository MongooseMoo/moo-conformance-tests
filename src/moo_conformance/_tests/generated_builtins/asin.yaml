name: generated_builtin_signature_asin
description: Generated conformance tests for asin() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - asin
tests:
- name: asin_function_info_signature_matches_source
  permission: wizard
  code: function_info("asin")
  expect:
    value:
    - asin
    - 1
    - 1
    - - 9
- name: asin_too_few_args
  permission: wizard
  code: asin()
  expect:
    error: E_ARGS
- name: asin_too_many_args
  permission: wizard
  code: asin(1.5, 1)
  expect:
    error: E_ARGS
- name: asin_arg_1_rejects_wrong_type
  permission: wizard
  code: asin("x")
  expect:
    error: E_TYPE
