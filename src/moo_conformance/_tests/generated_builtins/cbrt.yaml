name: generated_builtin_signature_cbrt
description: Generated conformance tests for cbrt() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - cbrt
tests:
- name: cbrt_function_info_signature_matches_source
  permission: wizard
  code: function_info("cbrt")
  expect:
    value:
    - cbrt
    - 1
    - 1
    - - 9
- name: cbrt_too_few_args
  permission: wizard
  code: cbrt()
  expect:
    error: E_ARGS
- name: cbrt_too_many_args
  permission: wizard
  code: cbrt(1.5, 1)
  expect:
    error: E_ARGS
- name: cbrt_arg_1_rejects_wrong_type
  permission: wizard
  code: cbrt("x")
  expect:
    error: E_TYPE
