name: generated_builtin_signature_match
description: Generated conformance tests for match() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - match
tests:
- name: match_function_info_signature_matches_source
  permission: wizard
  code: function_info("match")
  expect:
    value:
    - match
    - 2
    - 3
    - - 2
      - 2
      - -1
- name: match_too_few_args
  permission: wizard
  code: match()
  expect:
    error: E_ARGS
- name: match_too_many_args
  permission: wizard
  code: match("x", "x", 1, 1)
  expect:
    error: E_ARGS
- name: match_arg_1_rejects_wrong_type
  permission: wizard
  code: match(1, "x")
  expect:
    error: E_TYPE
- name: match_arg_2_rejects_wrong_type
  permission: wizard
  code: match("x", 1)
  expect:
    error: E_TYPE
