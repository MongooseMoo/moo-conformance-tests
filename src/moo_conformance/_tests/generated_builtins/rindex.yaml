name: generated_builtin_signature_rindex
description: Generated conformance tests for rindex() builtin signature, derived from
  Toast source.
requires:
  builtins:
  - function_info
  - rindex
tests:
- name: rindex_function_info_signature_matches_source
  permission: wizard
  code: function_info("rindex")
  expect:
    value:
    - rindex
    - 2
    - 4
    - - 2
      - 2
